<script>
// ── SOUND PANEL ──────────────────────────────────────────────────────────
var soundFmt = {
  gain:   function(v){ return Math.round(v * 100) + '%'; },
  attack: function(v){ return Math.round(v * 1000) + 'ms'; },
  decay:  function(v){ return v.toFixed(1) + 's'; },
  detune: function(v){ return (v > 0 ? '+' : '') + Math.round(v) + '¢'; }
};

function setFilmRoot(val) {
  Sound.params.filmRoot = val;
  Sound.params.roots['sec-film'] = val;
  Sound.params.roots['sec-comm'] = val * 0.667;
  Sound.params.roots['sec-ev']   = val * 0.75;
  Sound.params.roots['sec-edu']  = val * 0.889;
}

function updateSoundParamLabel(param, val) {
  var lbl = document.getElementById('sp-' + param + '-val');
  if (lbl && soundFmt[param]) lbl.textContent = soundFmt[param](val);
}

function syncSoundPanelUI() {
  var panel = document.getElementById('sound-panel');
  if (!panel) return;
  var p = Sound.params;
  panel.querySelectorAll('.sp-seg[data-param]').forEach(function(seg) {
    var param = seg.getAttribute('data-param');
    var val = p[param];
    seg.querySelectorAll('.sp-seg-btn').forEach(function(b) {
      var raw = b.getAttribute('data-val');
      var match = isNaN(raw) ? raw === val : parseFloat(raw) === val;
      b.classList.toggle('active', match);
    });
  });
  panel.querySelectorAll('input.sp-range[data-param]').forEach(function(input) {
    var param = input.getAttribute('data-param');
    if (p[param] === undefined) return;
    input.value = String(p[param]);
    updateSoundParamLabel(param, p[param]);
  });
}

function saveSoundPrefs() {
  try {
    localStorage.setItem('ec-sound', JSON.stringify({
      enabled: soundEnabled,
      params: Sound.params
    }));
  } catch (e) {}
}

function loadSoundPrefs() {
  try {
    var raw = JSON.parse(localStorage.getItem('ec-sound') || 'null');
    if (!raw) return;
    if (raw.params) {
      Object.assign(Sound.params, raw.params);
      if (raw.params.roots) Sound.params.roots = Object.assign({}, Sound.params.roots, raw.params.roots);
      if (raw.params.filmRoot) setFilmRoot(raw.params.filmRoot);
    }
    if (raw.enabled) {
      soundEnabled = true;
      var btn = document.getElementById('btn-sound');
      if (btn) {
        btn.textContent = 'Sound: On';
        btn.classList.add('sound-on');
      }
    }
    syncSoundPanelUI();
  } catch (e) {}
}

function toggleSoundPanel() {
  var p    = document.getElementById('sound-panel');
  var sBtn = document.getElementById('btn-sound-settings');
  var open = p.classList.toggle('open');
  p.setAttribute('aria-hidden', String(!open));
  if (sBtn) sBtn.classList.toggle('panel-open', open);
  if (open) syncSoundPanelUI();
}

function initSoundPanel() {
  var panel = document.getElementById('sound-panel');
  if (!panel) return;

  panel.addEventListener('click', function(e) {
    var btn    = e.target.closest('[data-val]');
    var action = e.target.closest('[data-action]');
    if (action) {
      if (action.getAttribute('data-action') === 'close') { toggleSoundPanel(); return; }
      if (action.getAttribute('data-action') === 'test')  { Sound.test(); return; }
    }
    if (!btn) return;
    var seg = btn.closest('[data-param]');
    if (!seg) return;
    var raw   = btn.getAttribute('data-val');
    var param = seg.getAttribute('data-param');
    var val   = isNaN(raw) ? raw : parseFloat(raw);
    if (param === 'filmRoot') setFilmRoot(val);
    else Sound.params[param] = val;
    seg.querySelectorAll('.sp-seg-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    saveSoundPrefs();
  });

  panel.addEventListener('input', function(e) {
    var el = e.target;
    if (el.tagName !== 'INPUT') return;
    var param = el.getAttribute('data-param');
    var val   = parseFloat(el.value);
    Sound.params[param] = val;
    updateSoundParamLabel(param, val);
    saveSoundPrefs();
  });
}

// ── SOUND SYSTEM ──────────────────────────────────────────────────────────
// Harmonic series rooted on A2 (110Hz). Each film row = a partial.
// Commercial, Events, Edu rows use a different root (D2 = 73.4Hz).
// Notes layer as you hover more rows, dissolve on mouseleave.
// All gains are low — this is texture, not music.

var soundEnabled = false;

function toggleSound() {
  soundEnabled = !soundEnabled;
  var btn = document.getElementById('btn-sound');
  btn.textContent = 'Sound: ' + (soundEnabled ? 'On' : 'Off');
  btn.classList.toggle('sound-on', soundEnabled);
  if (!soundEnabled) Sound.stopAll();
  saveSoundPrefs();
}

const Sound = (function() {
  var ctx = null;
  var activeNodes = new Map();
  var PARTIALS = [1, 2, 1.5, 1.25, 1.75, 2.25, 1.333, 1.667];

  var params = {
    wave:    'sine',
    gain:    0.12,
    attack:  0.18,
    decay:   1.6,
    detune:  0,
    filmRoot: 110,
    roots: {
      'sec-film':  110.00,
      'sec-comm':   73.42,
      'sec-ev':     82.41,
      'sec-edu':    98.00
    }
  };

  function boot() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function getRoot(row) {
    var sec = row.closest('.cv-section');
    return sec ? (params.roots[sec.id] || 110) : 110;
  }

  function getPartialIndex(row) {
    var rows = Array.from(row.closest('tbody').querySelectorAll('tr'));
    return rows.indexOf(row) % PARTIALS.length;
  }

  function play(row) {
    if (!soundEnabled || activeNodes.has(row)) return;
    boot();
    function go() {
      var freq = getRoot(row) * PARTIALS[getPartialIndex(row)];
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = params.wave;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.detune.setValueAtTime(params.detune, ctx.currentTime);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(params.gain, ctx.currentTime + params.attack);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      activeNodes.set(row, { osc: osc, gain: gain });
    }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  function stop(row) {
    if (!activeNodes.has(row)) return;
    var node = activeNodes.get(row);
    var t = ctx.currentTime;
    node.gain.gain.setValueAtTime(node.gain.gain.value, t);
    node.gain.gain.exponentialRampToValueAtTime(0.0001, t + params.decay);
    node.osc.stop(t + params.decay + 0.1);
    activeNodes.delete(row);
  }

  function stopAll() {
    activeNodes.forEach(function(_, row) { stop(row); });
  }

  function test() {
    boot();
    function go() {
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = params.wave;
      osc.frequency.setValueAtTime(params.filmRoot, ctx.currentTime);
      osc.detune.setValueAtTime(params.detune, ctx.currentTime);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(params.gain, ctx.currentTime + params.attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + params.attack + params.decay);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + params.attack + params.decay + 0.1);
    }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  return { play: play, stop: stop, stopAll: stopAll, test: test, params: params };
})();

initSoundPanel();
loadSoundPrefs();

function attachTableSound() {
  document.querySelectorAll('.cv-table tbody tr').forEach(row => {
    // Avoid double-binding
    if (row.dataset.soundBound) return;
    row.dataset.soundBound = '1';

    row.addEventListener('mouseenter', () => Sound.play(row));
    row.addEventListener('mouseleave', () => Sound.stop(row));
  });

  // Stop all notes when mouse leaves any table
  document.querySelectorAll('.cv-table').forEach(tbl => {
    tbl.addEventListener('mouseleave', () => Sound.stopAll());
  });
}

// ── Scroll reveal ──────────────────────────────────────────────
function initScrollReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        en.target.classList.add('visible');
        obs.unobserve(en.target);
      }
    });
  }, { threshold: 0.07, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.cv-section').forEach(el => obs.observe(el));
}

// ── Helpers ────────────────────────────────────────────────────
function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function parseInline(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_(.+?)_/g, '<em>$1</em>');
}

// Split a table row on | but respect \| escaped pipes
function splitRow(line) {
  // Replace \| temporarily, split, then restore
  const tmp = line.replace(/\\\|/g, '\x00PIPE\x00');
  const inner = tmp.replace(/^\s*\|\s*|\s*\|\s*$/g, '');
  return inner.split('|').map(c => c.replace(/\x00PIPE\x00/g, '|').trim());
}

// Format a cell: **Bold** becomes title, rest becomes subtitle
function formatCell(text) {
  const m = text.match(/^\*\*(.+?)\*\*\s*[·\-–]?\s*(.*)/);
  if (m) {
    const title = m[1].trim();
    const sub   = m[2].trim();
    return `<span class="ent-title">${parseInline(title)}</span>` +
           (sub ? `<span class="ent-sub">${parseInline(sub)}</span>` : '');
  }
  return parseInline(text);
}

function isSeparatorRow(line) {
  return /^\s*\|?\s*[-:]+[-| :]*$/.test(line);
}

// Split entity cells so Role / location align across all tables
function splitEntityCell(text, kind) {
  const m = text.match(/^\*\*(.+?)\*\*\s*(?:·\s*)?(.*)/s);
  if (!m) return { entityHtml: formatCell(text), role: '', premiere: '' };
  const title = m[1].trim();
  const rest  = m[2].trim();
  const titleHtml = `<span class="ent-title">${parseInline(title)}</span>`;

  if (kind === 'company') {
    const parts = rest.split(/\s*·\s*/).filter(Boolean);
    return {
      entityHtml: titleHtml,
      role: parts[0] || '',
      premiere: parts.slice(1).join(' · ') || ''
    };
  }
  if (kind === 'event') {
    return { entityHtml: titleHtml, role: '', premiere: rest ? parseInline(rest) : '' };
  }
  if (kind === 'institution') {
    return { entityHtml: titleHtml, role: '', degree: rest ? parseInline(rest) : '' };
  }
  return { entityHtml: formatCell(text), role: '', premiere: '' };
}

/* Shared 7-column grid — all tables pad to these slots for horizontal alignment */
const MASTER_COLS = [
  { key: 'status',    cls: 'col-status' },
  { key: 'entity',    cls: 'col-entity' },
  { key: 'role',      cls: 'col-role' },
  { key: 'premiere',  cls: 'col-premiere' },
  { key: 'festivals', cls: 'col-festivals' },
  { key: 'awards',    cls: 'col-awards' },
  { key: 'support',   cls: 'col-support' }
];

const COL_LABELS = {
  film: {
    entity: 'Project', role: 'Role', premiere: 'Premiere',
    festivals: 'Festivals', awards: 'Awards', support: 'Support'
  },
  commercial: {
    entity: 'Company', role: 'Role', premiere: 'Location',
    festivals: 'Clients', awards: '', support: ''
  },
  event: {
    entity: 'Event', role: 'Role', premiere: 'Location',
    festivals: 'Details', awards: '', support: ''
  },
  education: {
    entity: 'Institution', role: 'Degree', premiere: '',
    festivals: 'Details', awards: '', support: ''
  }
};

function tableKind(headers) {
  const hl = headers.map(h => h.toLowerCase());
  if (hl.includes('status')) return 'film';
  if (hl.includes('company')) return 'commercial';
  if (hl.includes('event')) return 'event';
  if (hl.includes('institution')) return 'education';
  return 'generic';
}

function normalizeTable(headers, rows) {
  const hl = headers.map(h => h.toLowerCase());
  const kind = tableKind(headers);
  const labels = COL_LABELS[kind] || COL_LABELS.film;

  const canon = MASTER_COLS.map(col => {
    let cls = col.cls;
    if (col.key === 'festivals' && kind === 'film') cls += ' hide-mobile';
    if ((col.key === 'awards' || col.key === 'support') && kind === 'film') cls += ' hide-mobile';
    return { key: col.key, label: labels[col.key] || '', cls };
  });

  const data = rows.map(cells => {
    const raw = {};
    const html = {};
    hl.forEach((h, i) => { raw[h] = (cells[i] || '').trim(); });

    if (kind === 'film' && raw.project) {
      html.entity = formatCell(raw.project);
    } else if (kind === 'commercial' && raw.company) {
      const s = splitEntityCell(raw.company, 'company');
      html.entity = s.entityHtml;
      raw.role = s.role;
      raw.premiere = s.premiere;
      raw.festivals = raw.clients || '';
    } else if (kind === 'event' && raw.event) {
      const s = splitEntityCell(raw.event, 'event');
      html.entity = s.entityHtml;
      raw.premiere = s.premiere;
      raw.festivals = raw.details || '';
    } else if (kind === 'education' && raw.institution) {
      const s = splitEntityCell(raw.institution, 'institution');
      html.entity = s.entityHtml;
      raw.role = s.degree || '';
      raw.festivals = raw.details || '';
    }

    return { raw, html };
  });

  return { canon, data, kind };
}

// ── Table builder ──────────────────────────────────────────────
function buildTable(headers, rows) {
  const { canon, data } = normalizeTable(headers, rows);

  let out = '<div class="table-wrap"><table class="cv-table"><colgroup>';
  canon.forEach(col => { out += `<col class="${col.cls.split(' ')[0]}">`; });
  out += '</colgroup><thead><tr>';

  canon.forEach(col => {
    const label = col.label ? parseInline(col.label) : '';
    const labelAttr = label ? ` data-label="${label.replace(/"/g, '&quot;')}"` : '';
    out += `<th class="${col.cls}"${labelAttr}>${col.key === 'status' ? '' : label}</th>`;
  });
  out += '</tr></thead><tbody>';

  data.forEach(({ raw, html }) => {
    out += '<tr>';
    canon.forEach(col => {
      const c = ` class="${col.cls}"`;
      const label = col.label ? parseInline(col.label) : col.key;
      const labelAttr = col.key === 'status' ? '' :
        ` data-label="${label.replace(/"/g, '&quot;')}"`;

      if (col.key === 'status') {
        if (!raw.status) {
          out += `<td class="${col.cls} col-status-empty"${labelAttr}></td>`;
        } else {
          const done = raw.status.toLowerCase() === 'done';
          out += `<td${c}><span class="dot ${done ? 'dot-done' : 'dot-wip'}"></span></td>`;
        }
      } else if (col.key === 'entity') {
        const content = html.entity || '';
        out += `<td${c}${labelAttr}>${content}</td>`;
      } else {
        const val = raw[col.key] || '';
        out += `<td${c}${labelAttr}>${val ? parseInline(val) : ''}</td>`;
      }
    });
    out += '</tr>';
  });

  out += '</tbody></table></div>';
  return out;
}

// ── Frontmatter parser ─────────────────────────────────────────
function parseFrontmatter(raw) {
  const m = raw.match(/^\s*---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  const meta = {};
  m[1].split('\n').forEach(line => {
    const colon = line.indexOf(':');
    if (colon < 0) return;
    meta[line.slice(0, colon).trim()] = line.slice(colon + 1).trim();
  });
  return { meta, body: m[2] };
}

// ── Main render ────────────────────────────────────────────────
async function render() {
  let raw = '';
  try {
    const res = await fetch('content.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    raw = await res.text();
  } catch (err) {
    console.error('Could not load content.md:', err);
    document.getElementById('cv-bio').innerHTML =
      '<p>Could not load <code>content.md</code>. This site must be served over HTTP — run <code>python3 -m http.server</code> in this folder, or use Live Server.</p>';
    return;
  }
  const { meta, body } = parseFrontmatter(raw);

  // ── Meta fields ──
  if (meta.photo) document.getElementById('cv-photo').src = meta.photo;
  if (meta.subtitle) document.getElementById('cv-subtitle').textContent = meta.subtitle;

  // ── Parse body lines ──
  const lines = body.split('\n');
  let name        = '';
  let bioParts    = [];   // strings + '' for blank lines
  let sections    = [];
  let cur         = null; // current section
  let tblHeaders  = null;
  let tblRows     = [];

  function flushTable() {
    if (cur && tblHeaders) {
      cur.tables.push({ headers: tblHeaders, rows: tblRows });
    }
    tblHeaders = null; tblRows = [];
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // H1 = name
    if (trimmed.startsWith('# ') && !trimmed.startsWith('## ')) {
      name = trimmed.slice(2).trim();
      continue;
    }

    // H2 = new section
    if (trimmed.startsWith('## ')) {
      flushTable();
      if (cur) sections.push(cur);
      cur = { title: trimmed.slice(3).trim(), tables: [], paras: [] };
      continue;
    }

    // Table row
    if (trimmed.startsWith('|')) {
      const next = (lines[i + 1] || '').trim();
      if (!tblHeaders && isSeparatorRow(lines[i + 1] || '')) {
        // Header row
        tblHeaders = splitRow(trimmed);
        i++; // skip separator
        continue;
      } else if (tblHeaders && !isSeparatorRow(trimmed)) {
        tblRows.push(splitRow(trimmed));
        continue;
      }
    } else if (tblHeaders) {
      flushTable();
    }

    // Blank line
    if (!trimmed) {
      if (!cur) bioParts.push('');
      continue;
    }

    // Paragraph text
    if (!trimmed.startsWith('#')) {
      if (!cur) bioParts.push(trimmed);
      else      cur.paras.push(trimmed);
    }
  }
  flushTable();
  if (cur) sections.push(cur);

  // ── Set name ──
  document.getElementById('cv-name').textContent = name;
  document.title = name + (meta.subtitle ? ' — ' + meta.subtitle : '');

  const footerRight = [];
  if (meta.privacy) footerRight.push(`<a href="${meta.privacy}">Privacy Policy</a>`);
  if (meta.location) footerRight.push(`<span class="footer-plain">${meta.location}</span>`);
  footerRight.push(`<span class="footer-plain">© ${new Date().getFullYear()} ${name}. All rights reserved.</span>`);
  const footerLeft = meta.email
    ? `<span class="footer-left"><a href="mailto:${meta.email}">${meta.email}</a></span>` : '';
  const footerRightHtml = footerRight.length
    ? `<span class="footer-right">${footerRight.join('')}</span>` : '';
  document.getElementById('cv-footer').innerHTML = footerLeft + footerRightHtml;

  // ── Render bio: split on blank lines into <p> tags ──
  const bioParas = [];
  let para = [];
  bioParts.forEach(part => {
    if (part === '') {
      if (para.length) { bioParas.push(para.join(' ')); para = []; }
    } else {
      para.push(part);
    }
  });
  if (para.length) bioParas.push(para.join(' '));
  document.getElementById('cv-bio').innerHTML =
    bioParas.map(p => `<p>${parseInline(p)}</p>`).join('');

  // ── Render sections ──
  document.getElementById('cv-sections').innerHTML = sections.map(sec => {
    const id    = `sec-${slugify(sec.title)}`;
    const tbls  = sec.tables.map(t => buildTable(t.headers, t.rows)).join('');
    const paras = sec.paras.map(p => `<p>${parseInline(p)}</p>`).join('');
    return `<section class="cv-section" id="${id}">
      <div class="sec-head">
        <span class="sec-label">${parseInline(sec.title)}</span>
        <button class="sec-toggle" onclick="toggleSection('${id}')">Hide</button>
      </div>
      <div class="sec-body"><div class="sec-body-inner">${tbls}${paras}</div></div>
    </section>`;
  }).join('');

  // ── Restore hidden sections ──
  _hiddenOnLoad.forEach(id => {
    const sec = document.getElementById(id);
    if (!sec) return;
    sec.classList.add('sec-hidden');
    const btn = sec.querySelector('.sec-toggle');
    if (btn) btn.textContent = 'Show';
  });

  // ── Init scroll animations ──
  requestAnimationFrame(initScrollReveal);
  requestAnimationFrame(attachTableSound);
}

// ── Export mode: inline A4 preview, print = WYSIWYG ──
var PRINT_PAGE_H_PX = 277 * (96 / 25.4);
var A4_PAGE_W_PX = 210 * (96 / 25.4);
var a4Anchors = { hero: null, work: null };

function isA4Mode() {
  return document.documentElement.classList.contains('a4-mode');
}

function activeNavBar() {
  return document.getElementById('toolbar');
}

function applyWorkScale(pct) {
  var scale = Math.max(0.5, Math.min(1, (pct || 100) / 100));
  document.documentElement.style.setProperty('--a4-work-scale', String(scale));
  var page2 = document.getElementById('a4-page-2');
  if (page2) page2.style.setProperty('--a4-work-scale', String(scale));
}

function autoFitWorkScale() {
  var page2 = document.getElementById('a4-page-2');
  if (!page2) return;
  applyWorkScale(100);
  void page2.offsetHeight;
  if (page2.scrollHeight > PRINT_PAGE_H_PX) {
    applyWorkScale(Math.min(100, Math.round((PRINT_PAGE_H_PX / page2.scrollHeight) * 100)));
  }
}

function preparePrintLayout() {
  if (!isA4Mode()) return;
  autoFitWorkScale();
  syncA4ToolbarOffset();
  updateA4ViewportScale();
}

function syncA4ToolbarOffset() {
  var tb = activeNavBar();
  var stage = document.getElementById('a4-stage');
  if (!tb || !stage || !isA4Mode()) return;
  stage.style.paddingTop = (tb.offsetHeight + 12) + 'px';
}

function updateA4ViewportScale() {
  var pages = document.getElementById('a4-pages');
  if (!pages || !isA4Mode()) return;
  var scale = Math.min(1, (window.innerWidth - 32) / A4_PAGE_W_PX);
  pages.style.zoom = scale < 1 ? String(scale) : '';
}

function mountA4Content() {
  var hero = document.getElementById('hero');
  var work = document.getElementById('print-work');
  var page1 = document.getElementById('a4-page-1');
  var page2 = document.getElementById('a4-page-2');
  if (!hero || !work || !page1 || !page2) return;
  if (!a4Anchors.hero) {
    a4Anchors.hero = { parent: hero.parentNode, next: hero.nextSibling };
    a4Anchors.work = { parent: work.parentNode, next: work.nextSibling };
  }
  page1.appendChild(hero);
  page2.appendChild(work);
}

function unmountA4Content() {
  var hero = document.getElementById('hero');
  var work = document.getElementById('print-work');
  if (!hero || !work || !a4Anchors.hero || !a4Anchors.work) return;
  var hA = a4Anchors.hero;
  var wA = a4Anchors.work;
  if (hA.next) hA.parent.insertBefore(hero, hA.next);
  else hA.parent.appendChild(hero);
  if (wA.next) wA.parent.insertBefore(work, wA.next);
  else wA.parent.appendChild(work);
}

function setA4Mode(on) {
  var html = document.documentElement;
  var stage = document.getElementById('a4-stage');
  var siteActions = document.getElementById('toolbar-site');
  var exportActions = document.getElementById('toolbar-export');
  var soundPanel = document.getElementById('sound-panel');
  if (on) {
    mountA4Content();
    html.classList.add('a4-mode');
    if (stage) stage.removeAttribute('hidden');
    if (siteActions) siteActions.hidden = true;
    if (exportActions) exportActions.hidden = false;
    if (soundPanel && soundPanel.classList.contains('open')) toggleSoundPanel();
    preparePrintLayout();
    window.scrollTo(0, 0);
  } else {
    html.classList.remove('a4-mode');
    if (stage) {
      stage.setAttribute('hidden', '');
      stage.style.paddingTop = '';
    }
    var pages = document.getElementById('a4-pages');
    if (pages) pages.style.zoom = '';
    var page2 = document.getElementById('a4-page-2');
    if (page2) page2.style.removeProperty('--a4-work-scale');
    document.documentElement.style.removeProperty('--a4-work-scale');
    if (siteActions) siteActions.hidden = false;
    if (exportActions) exportActions.hidden = true;
    unmountA4Content();
  }
}

function enterExportMode() {
  setA4Mode(true);
}

function exportA4() {
  if (!isA4Mode()) setA4Mode(true);
  preparePrintLayout();
  window.print();
}

var a4EnteredForPrint = false;

function initA4Controls() {
  document.getElementById('btn-export')?.addEventListener('click', enterExportMode);
  document.getElementById('btn-print')?.addEventListener('click', exportA4);
  document.getElementById('btn-back')?.addEventListener('click', function() { setA4Mode(false); });
  window.addEventListener('resize', function() {
    if (!isA4Mode()) return;
    syncA4ToolbarOffset();
    updateA4ViewportScale();
  });
  window.addEventListener('beforeprint', function() {
    if (!isA4Mode()) {
      a4EnteredForPrint = true;
      setA4Mode(true);
    }
    preparePrintLayout();
  });
  window.addEventListener('afterprint', function() {
    if (a4EnteredForPrint) {
      a4EnteredForPrint = false;
      setA4Mode(false);
    }
  });
}

document.addEventListener('DOMContentLoaded', function() {
  setA4Mode(false);
  initA4Controls();
  render();
});

</script>
