<div id="sound-panel" aria-hidden="true">

    <div class="sp-row">
      <span class="sp-label">Wave</span>

        <button class="sp-seg-btn" data-val="sawtooth">Saw</button>

    </div>

    <div class="sp-row">
      <span class="sp-label">Volume</span>
      <input class="sp-range" data-param="gain" type="range"
             min="0" max="0.4" step="0.01" value="0.12">
      <span class="sp-val" id="sp-gain-val">12%</span>
    </div>

    <div class="sp-row">
      <span class="sp-label">Attack</span>
      <input class="sp-range" data-param="attack" type="range"
             min="0.01" max="1.0" step="0.01" value="0.18">
      <span class="sp-val" id="sp-attack-val">180ms</span>
    </div>

    <div class="sp-row">
      <span class="sp-label">Decay</span>
      <input class="sp-range" data-param="decay" type="range"
             min="0.2" max="4.0" step="0.1" value="1.6">
      <span class="sp-val" id="sp-decay-val">1.6s</span>
    </div>

    <div class="sp-row">
      <span class="sp-label">Detune</span>
      <input class="sp-range" data-param="detune" type="range"
             min="-50" max="50" step="1" value="0">
      <span class="sp-val" id="sp-detune-val">0&#xa2;</span>
    </div>

    <div class="sp-row">
      <span class="sp-label">Root</span>
      <div class="sp-seg" data-param="filmRoot">
        <button class="sp-seg-btn active" data-val="110">A</button>
        <button class="sp-seg-btn" data-val="123.47">B</button>
        <button class="sp-seg-btn" data-val="130.81">C</button>
        <button class="sp-seg-btn" data-val="146.83">D</button>
        <button class="sp-seg-btn" data-val="164.81">E</button>
      </div>
    </div>

    <button class="sp-test" data-action="test">&#9654; Test note</button>
  </div>
</div>

<section id="hero">

<script>
// ── SOUND PANEL ──────────────────────────────────────────────────────────
function toggleSoundPanel() {
  var p    = document.getElementById('sound-panel');
  var sBtn = document.getElementById('btn-sound-settings');
  var open = p.classList.toggle('open');
  p.setAttribute('aria-hidden', String(!open));
  if (sBtn) sBtn.classList.toggle('panel-open', open);
}

// Single delegated listener for the whole panel
function initSoundPanel() {
  var panel = document.getElementById('sound-panel');
  if (!panel) return;

  panel.addEventListener('click', function(e) {
    var btn    = e.target.closest('[data-val]');
    var action = e.target.closest('[data-action]');
    if (action) {
      if (action.getAttribute('data-action') === 'close') { toggleSoundPanel(); return; }
      if (action.getAttribute('data-action') === 'test')  { Sound.test(); return; }
    }
    if (!btn) return;
    var seg = btn.closest('[data-param]');
    if (!seg) return;
    var raw   = btn.getAttribute('data-val');
    var param = seg.getAttribute('data-param');
    var val   = isNaN(raw) ? raw : parseFloat(raw);
    Sound.params[param] = val;
    if (param === 'filmRoot') {
      Sound.params.roots['sec-film'] = val;
      Sound.params.roots['sec-comm'] = val * 0.667;
      Sound.params.roots['sec-ev']   = val * 0.75;
      Sound.params.roots['sec-edu']  = val * 0.889;
    }
    seg.querySelectorAll('.sp-seg-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  });

  panel.addEventListener('input', function(e) {
    var el = e.target;
    if (el.tagName !== 'INPUT') return;
    var param = el.getAttribute('data-param');
    var val   = parseFloat(el.value);
    Sound.params[param] = val;
    var fmt = {
      gain:   function(v){ return Math.round(v*100)+'%'; },
      attack: function(v){ return Math.round(v*1000)+'ms'; },
      decay:  function(v){ return v.toFixed(1)+'s'; },
      detune: function(v){ return (v>0?'+':'')+Math.round(v)+'¢'; }
    };
    var lbl = document.getElementById('sp-'+param+'-val');
    if (lbl && fmt[param]) lbl.textContent = fmt[param](val);
  });
}
initSoundPanel();

// ── SOUND SYSTEM ──────────────────────────────────────────────────────────
// Harmonic series rooted on A2 (110Hz). Each film row = a partial.
// Commercial, Events, Edu rows use a different root (D2 = 73.4Hz).
// Notes layer as you hover more rows, dissolve on mouseleave.
// All gains are low — this is texture, not music.

var soundEnabled = false;

function toggleSound() {
  soundEnabled = !soundEnabled;
  var btn = document.getElementById('btn-sound');
  btn.textContent = 'Sound: ' + (soundEnabled ? 'On' : 'Off');
  btn.classList.toggle('sound-on', soundEnabled);
  if (!soundEnabled) Sound.stopAll();
}

const Sound = (function() {
  var ctx = null;
  var activeNodes = new Map();
  var PARTIALS = [1, 2, 1.5, 1.25, 1.75, 2.25, 1.333, 1.667];

  var params = {
    wave:    'sine',
    gain:    0.12,
    attack:  0.18,
    decay:   1.6,
    detune:  0,
    filmRoot: 110,
    roots: {
      'sec-film':  110.00,
      'sec-comm':   73.42,
      'sec-ev':     82.41,
      'sec-edu':    98.00
    }
  };

  function boot() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function getRoot(row) {
    var sec = row.closest('.cv-section');
    return sec ? (params.roots[sec.id] || 110) : 110;
  }

  function getPartialIndex(row) {
    var rows = Array.from(row.closest('tbody').querySelectorAll('tr'));
    return rows.indexOf(row) % PARTIALS.length;
  }

  function play(row) {
    if (!soundEnabled || activeNodes.has(row)) return;
    boot();
    function go() {
      var freq = getRoot(row) * PARTIALS[getPartialIndex(row)];
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = params.wave;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.detune.setValueAtTime(params.detune, ctx.currentTime);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(params.gain, ctx.currentTime + params.attack);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      activeNodes.set(row, { osc: osc, gain: gain });
    }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  function stop(row) {
    if (!activeNodes.has(row)) return;
    var node = activeNodes.get(row);
    var t = ctx.currentTime;
    node.gain.gain.setValueAtTime(node.gain.gain.value, t);
    node.gain.gain.exponentialRampToValueAtTime(0.0001, t + params.decay);
    node.osc.stop(t + params.decay + 0.1);
    activeNodes.delete(row);
  }

  function stopAll() {
    activeNodes.forEach(function(_, row) { stop(row); });
  }

  function test() {
    boot();
    function go() {
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = params.wave;
      osc.frequency.setValueAtTime(params.filmRoot, ctx.currentTime);
      osc.detune.setValueAtTime(params.detune, ctx.currentTime);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(params.gain, ctx.currentTime + params.attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + params.attack + params.decay);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + params.attack + params.decay + 0.1);
    }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  return { play: play, stop: stop, stopAll: stopAll, test: test, params: params };
})();

function attachTableSound() {
  document.querySelectorAll('.cv-table tbody tr').forEach(row => {
    // Avoid double-binding
    if (row.dataset.soundBound) return;
    row.dataset.soundBound = '1';

    row.addEventListener('mouseenter', () => Sound.play(row));
    row.addEventListener('mouseleave', () => Sound.stop(row));
  });

  // Stop all notes when mouse leaves any table
  document.querySelectorAll('.cv-table').forEach(tbl => {
    tbl.addEventListener('mouseleave', () => Sound.stopAll());
  });
}

// ── Preferences (run before DOMContentLoaded to avoid flash) ──
if (localStorage.getItem('ec-dark') === '1')
  document.documentElement.classList.add('dark');

const _hiddenOnLoad = new Set(
  Object.entries(JSON.parse(localStorage.getItem('ec-hidden') || '{}'  ))
    .filter(([,v]) => v).map(([k]) => k)
);

// ── Dark mode ──────────────────────────────────────────────────
function toggleDark() {
  const on = document.documentElement.classList.toggle('dark');
  localStorage.setItem('ec-dark', on ? '1' : '0');
}

// ── Section hide/show ──────────────────────────────────────────
function toggleSection(id) {
  const sec = document.getElementById(id);
  if (!sec) return;
  const hidden = sec.classList.toggle('sec-hidden');
  sec.querySelector('.sec-toggle').textContent = hidden ? 'Show' : 'Hide';
  const state = JSON.parse(localStorage.getItem('ec-hidden') || '{}');
  state[id] = hidden;
  localStorage.setItem('ec-hidden', JSON.stringify(state));
}

// ── Scroll reveal ──────────────────────────────────────────────
function initScrollReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        en.target.classList.add('visible');
        obs.unobserve(en.target);
      }
    });
  }, { threshold: 0.07, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.cv-section').forEach(el => obs.observe(el));
}

// ── Helpers ────────────────────────────────────────────────────
function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function parseInline(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_(.+?)_/g, '<em>$1</em>');
}

// Split a table row on | but respect \| escaped pipes
function splitRow(line) {
  // Replace \| temporarily, split, then restore
  const tmp = line.replace(/\\\|/g, '\x00PIPE\x00');
  const inner = tmp.replace(/^\s*\|\s*|\s*\|\s*$/g, '');
  return inner.split('|').map(c => c.replace(/\x00PIPE\x00/g, '|').trim());
}

// Format a cell: **Bold** becomes title, rest becomes subtitle
function formatCell(text) {
  const m = text.match(/^\*\*(.+?)\*\*\s*[·\-–]?\s*(.*)/);
  if (m) {
    const title = m[1].trim();
    const sub   = m[2].trim();
    return `<span class="ent-title">${parseInline(title)}</span>` +
           (sub ? `<span class="ent-sub">${parseInline(sub)}</span>` : '');
  }
  return parseInline(text);
}

function isSeparatorRow(line) {
  return /^\s*\|?\s*[-:]+[-| :]*$/.test(line);
}

// ── Table builder ──────────────────────────────────────────────
function buildTable(headers, rows) {
  const hl = headers.map(h => h.toLowerCase());
  const isFilm = hl.includes('status');

  // Column CSS classes
  const cls = headers.map(h => {
    switch (h.toLowerCase()) {
      case 'status':      return 'col-status';
      case 'project':
      case 'company':
      case 'event':
      case 'institution': return 'col-entity';
      case 'festivals':   return 'col-festivals hide-mobile';
      case 'awards':      return 'col-awards hide-mobile';
      case 'support':     return 'col-support hide-mobile';
      default:            return '';
    }
  });

  let out = '<div class="table-wrap"><table class="cv-table"><thead><tr>';
  headers.forEach((h, i) => {
    const c = cls[i] ? ` class="${cls[i]}"` : '';
    out += `<th${c}>${h.toLowerCase() === 'status' ? '' : parseInline(h)}</th>`;
  });
  out += '</tr></thead><tbody>';

  rows.forEach(cells => {
    out += '<tr>';
    headers.forEach((h, i) => {
      const cell = (cells[i] || '').trim();
      const c = cls[i] ? ` class="${cls[i]}"` : '';
      const lh = h.toLowerCase();

      const labelAttr = lh === 'status' ? '' :
        ` data-label="${parseInline(h).replace(/"/g, '&quot;')}"`;

      if (lh === 'status') {
        const done = cell.toLowerCase() === 'done';
        out += `<td${c}><span class="dot ${done ? 'dot-done' : 'dot-wip'}"></span></td>`;
      } else if (lh === 'project' || lh === 'company' || lh === 'event' || lh === 'institution') {
        out += `<td${c}${labelAttr}>${formatCell(cell)}</td>`;
      } else {
        out += `<td${c}${labelAttr}>${parseInline(cell)}</td>`;
      }
    });
    out += '</tr>';
  });

  out += '</tbody></table></div>';
  return out;
}

// ── Frontmatter parser ─────────────────────────────────────────
function parseFrontmatter(raw) {
  const m = raw.match(/^\s*---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  const meta = {};
  m[1].split('\n').forEach(line => {
    const colon = line.indexOf(':');
    if (colon < 0) return;
    meta[line.slice(0, colon).trim()] = line.slice(colon + 1).trim();
  });
  return { meta, body: m[2] };
}

// ── Main render ────────────────────────────────────────────────
async function render() {
  let raw = '';
  try {
    const res = await fetch('content.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    raw = await res.text();
  } catch (err) {
    console.error('Could not load content.md:', err);
    document.getElementById('cv-bio').innerHTML =
      '<p>Could not load <code>content.md</code>. This site must be served over HTTP — run <code>python3 -m http.server</code> in this folder, or use Live Server.</p>';
    return;
  }
  const { meta, body } = parseFrontmatter(raw);

  // ── Meta fields ──
  if (meta.photo) document.getElementById('cv-photo').src = meta.photo;
  if (meta.subtitle) document.getElementById('cv-subtitle').textContent = meta.subtitle;
  if (meta.location) document.getElementById('cv-footer').textContent   = meta.location;

  if (meta.email) {
    document.getElementById('cv-contact').innerHTML =
      `<a href="mailto:${meta.email}">${meta.email}</a>`;
  }

  // ── Parse body lines ──
  const lines = body.split('\n');
  let name        = '';
  let bioParts    = [];   // strings + '' for blank lines
  let sections    = [];
  let cur         = null; // current section
  let tblHeaders  = null;
  let tblRows     = [];

  function flushTable() {
    if (cur && tblHeaders) {
      cur.tables.push({ headers: tblHeaders, rows: tblRows });
    }
    tblHeaders = null; tblRows = [];
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // H1 = name
    if (trimmed.startsWith('# ') && !trimmed.startsWith('## ')) {
      name = trimmed.slice(2).trim();
      continue;
    }

    // H2 = new section
    if (trimmed.startsWith('## ')) {
      flushTable();
      if (cur) sections.push(cur);
      cur = { title: trimmed.slice(3).trim(), tables: [], paras: [] };
      continue;
    }

    // Table row
    if (trimmed.startsWith('|')) {
      const next = (lines[i + 1] || '').trim();
      if (!tblHeaders && isSeparatorRow(lines[i + 1] || '')) {
        // Header row
        tblHeaders = splitRow(trimmed);
        i++; // skip separator
        continue;
      } else if (tblHeaders && !isSeparatorRow(trimmed)) {
        tblRows.push(splitRow(trimmed));
        continue;
      }
    } else if (tblHeaders) {
      flushTable();
    }

    // Blank line
    if (!trimmed) {
      if (!cur) bioParts.push('');
      continue;
    }

    // Paragraph text
    if (!trimmed.startsWith('#')) {
      if (!cur) bioParts.push(trimmed);
      else      cur.paras.push(trimmed);
    }
  }
  flushTable();
  if (cur) sections.push(cur);

  // ── Set name ──
  document.getElementById('cv-name').textContent = name;
  document.getElementById('toolbar-name').textContent = name;
  document.title = name + (meta.subtitle ? ' — ' + meta.subtitle : '');

  // ── Render bio: split on blank lines into <p> tags ──
  const bioParas = [];
  let para = [];
  bioParts.forEach(part => {
    if (part === '') {
      if (para.length) { bioParas.push(para.join(' ')); para = []; }
    } else {
      para.push(part);
    }
  });
  if (para.length) bioParas.push(para.join(' '));
  document.getElementById('cv-bio').innerHTML =
    bioParas.map(p => `<p>${parseInline(p)}</p>`).join('');

  // ── Render sections ──
  document.getElementById('cv-sections').innerHTML = sections.map(sec => {
    const id    = `sec-${slugify(sec.title)}`;
    const tbls  = sec.tables.map(t => buildTable(t.headers, t.rows)).join('');
    const paras = sec.paras.map(p => `<p>${parseInline(p)}</p>`).join('');
    return `<section class="cv-section" id="${id}">
      <div class="sec-head">
        <span class="sec-label">${parseInline(sec.title)}</span>
        <button class="sec-toggle" onclick="toggleSection('${id}')">Hide</button>
      </div>
      <div class="sec-body">${tbls}${paras}</div>
    </section>`;
  }).join('');

  // ── Restore hidden sections ──
  _hiddenOnLoad.forEach(id => {
    const sec = document.getElementById(id);
    if (!sec) return;
    sec.classList.add('sec-hidden');
    const btn = sec.querySelector('.sec-toggle');
    if (btn) btn.textContent = 'Show';
  });

  // ── Init scroll animations ──
  requestAnimationFrame(initScrollReveal);
  requestAnimationFrame(attachTableSound);
}

document.addEventListener('DOMContentLoaded', render);  function test() {
    boot();
    function go() {
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = params.wave;
      osc.frequency.setValueAtTime(params.filmRoot, ctx.currentTime);
      osc.detune.setValueAtTime(params.detune, ctx.currentTime);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(params.gain, ctx.currentTime + params.attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + params.attack + params.decay);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + params.attack + params.decay + 0.1);
    }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

</script>
