*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  transition: background .3s, color .3s;
}

/* ── LINKS — underline appears on hover, offset + thin ── */
a {
  color: inherit;
  text-decoration: none;
  text-underline-offset: 3px;
  text-decoration-thickness: .5px;
}
a:hover { text-decoration: underline; }

/* ── TOOLBAR ── */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--bar-h);
  display: flex; align-items: center;
  padding: 0 var(--pad-x);
  background: var(--bg);
  border-bottom: .5px solid var(--border);
  transition: background .3s, border-color .3s;
}
#toolbar-name {
  font-size: 11px; letter-spacing: .05em;
  flex: 1; opacity: .55;
}
/* Toolbar buttons as plain text links */
.tb-btn {
  font-family: var(--font);
  font-size: 11px; letter-spacing: .03em;
  color: var(--mid); background: none; border: none;
  cursor: pointer; padding: 0 0 0 24px;
  text-underline-offset: 3px;
  text-decoration-thickness: .5px;
  transition: color .15s;
}
.tb-btn:hover { color: var(--ink); text-decoration: underline; }
#btn-dark { letter-spacing: 0; font-size: 13px; }

/* ── HERO ── */
#hero {
  display: grid;
  grid-template-columns: 46% 1fr;
  min-height: 100vh;
  padding-top: var(--bar-h);
}
#hero-text {
  padding: clamp(48px, 7vw, 96px) var(--pad-x);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding-bottom: clamp(40px, 6vw, 80px);
}
#hero-photo {
  position: sticky; top: var(--bar-h);
  height: calc(100vh - var(--bar-h));
  overflow: hidden;
}
#cv-photo {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 25%;
  filter: grayscale(100%);
  display: block;
}

/* ── NAME ── */
#cv-name {
  font-size: clamp(48px, 5.8vw, 88px);
  font-weight: 400; line-height: .93;
  letter-spacing: -.03em;
  margin-bottom: clamp(16px, 2vw, 28px);
}

/* ── SUBTITLE ── */
#cv-subtitle {
  font-size: 11px;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--mid);
  margin-bottom: clamp(32px, 4vw, 56px);
}

/* ── BIO ── */
#cv-bio p {
  font-size: clamp(13px, 1vw, 14px);
  line-height: 1.75; color: var(--ink);
  max-width: 52ch;
  margin-bottom: .85em;
}
#cv-bio p:last-child { margin-bottom: 0; }
#cv-bio em { font-style: italic; }

/* ── CONTACT (below tables) ── */
#cv-contact {
  font-size: 11px; letter-spacing: .03em; color: var(--mid);
}
#cv-contact a {
  text-underline-offset: 3px;
  text-decoration-thickness: .5px;
}
#cv-contact a:hover { color: var(--ink); text-decoration: underline; }

/* ── SECTIONS ── */
#cv-sections {
  padding: clamp(56px, 7vw, 96px) var(--pad-x);
  border-top: .5px solid var(--border);
}
.cv-section { margin-bottom: clamp(48px, 6vw, 80px); }
.cv-section:last-child { margin-bottom: 0; }

.sec-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding-bottom: 0;
}
.sec-label {
  font-size: 10px; letter-spacing: .13em; text-transform: uppercase;
  color: var(--mid); font-weight: 400;
}

/* Toggle as plain text link */
.sec-toggle {
  font-family: var(--font);
  font-size: 10px; letter-spacing: .07em; text-transform: uppercase;
  color: var(--mid); background: none; border: none; cursor: pointer;
  padding: 0; opacity: .4;
  text-underline-offset: 3px; text-decoration-thickness: .5px;
  transition: opacity .15s, color .15s;
}
.sec-toggle:hover { opacity: 1; text-decoration: underline; }
.cv-section.sec-hidden .sec-toggle { opacity: 1; }
.cv-section.sec-hidden .sec-label  { opacity: .25; }
.cv-section.sec-hidden .sec-body   { display: none; }

/* ── TABLES ── */
.table-wrap { overflow-x: auto; margin-top: 20px; }

.cv-table {
  width: 100%; border-collapse: collapse;
  font-size: clamp(11px, .85vw, 13px);
}

/* Hairline rule above header only */
.cv-table thead tr {
  border-top: .5px solid var(--ink);
}

.cv-table th {
  font-size: 9px; letter-spacing: .11em; text-transform: uppercase;
  color: var(--mid); font-weight: 400; text-align: left;
  padding: 8px 20px 8px 0;
  border-bottom: .5px solid var(--border);
}
.cv-table th:last-child { padding-right: 0; }

.cv-table td {
  padding: 10px 20px 10px 0;
  vertical-align: top; line-height: 1.55;
  border-bottom: .5px solid var(--border);
}
.cv-table td:last-child { padding-right: 0; }
.cv-table tr:last-child td { border-bottom: none; }

/* Row hover — subtle bg */
.cv-table tbody tr {
  transition: background .12s;
}
.cv-table tbody tr:hover {
  background: color-mix(in srgb, var(--ink) 3%, transparent);
}

/* Status dot */
.col-status th, .col-status td {
  width: 18px; padding-right: 10px;
}
.dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  margin-top: 4px;
}
.dot-done { background: var(--ink); }
.dot-wip  { border: 1px solid var(--mid); }

/* Entity title + sub */
.ent-title { display: block; letter-spacing: -.005em; }
.ent-sub   { display: block; font-size: .88em; color: var(--mid); margin-top: 2px; line-height: 1.4; }

/* ── CONTACT BETWEEN SECTIONS AND FOOTER ── */
#cv-contact-wrap {
  padding: 0 var(--pad-x) clamp(16px, 2vw, 24px);
}

/* ── FOOTER ── */
#cv-footer {
  padding: clamp(20px, 3vw, 36px) var(--pad-x);
  font-size: 11px; letter-spacing: .03em; color: var(--mid);
  border-top: .5px solid var(--border);
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  #hero {
    grid-template-columns: 1fr;
    min-height: auto;
  }
  #hero-photo {
    position: relative; top: 0;
    height: 68vw; order: -1;
  }
  #hero-text {
    justify-content: flex-start;
    padding-top: clamp(32px, 5vw, 56px);
    padding-bottom: clamp(32px, 5vw, 56px);
  }
  .hide-mobile { display: none; }
}

/* ── PRINT ── */
@media print {
  :root { --bar-h: 0px; --pad-x: 14mm; }
  #toolbar { display: none; }
  #hero {
    grid-template-columns: 108mm 95mm;
    height: 126mm; min-height: 0; padding-top: 0;
  }
  #hero-photo { position: relative; height: 100%; }
  #hero-text  { padding: 12mm 10mm 12mm var(--pad-x); justify-content: flex-start; }
  #cv-name    { font-size: 40px; letter-spacing: -.025em; }
  #cv-bio p   { font-size: 8px; line-height: 1.65; }
  #cv-subtitle { font-size: 7px; }
  #cv-sections { padding: 9mm var(--pad-x) 14mm; }
  .cv-section  { margin-bottom: 7mm; page-break-inside: auto; }
  .sec-toggle, .sec-label { font-size: 6px; }
  .sec-toggle  { display: none; }
  .cv-section.sec-hidden { display: none; }
  .cv-table    { font-size: 7px; }
  .cv-table th { font-size: 5.5px; padding: 4px 10px 4px 0; }
  .cv-table td { padding: 5px 10px 5px 0; }
  tr { page-break-inside: avoid; }
  #cv-footer   { padding: 5mm var(--pad-x); font-size: 7px; }
}

/* ── SCROLL REVEAL ── */
.cv-section {
  opacity: 0; transform: translateY(24px);
  transition: opacity .7s cubic-bezier(.16,1,.3,1),
              transform .7s cubic-bezier(.16,1,.3,1);
}
.cv-section.visible { opacity: 1; transform: translateY(0); }
.cv-section:nth-child(2) { transition-delay: .06s; }
.cv-section:nth-child(3) { transition-delay: .10s; }
.cv-section:nth-child(4) { transition-delay: .14s; }
@media print { .cv-section { opacity: 1 !important; transform: none !important; } }
@media (prefers-reduced-motion: reduce) { .cv-section { transition: none; opacity: 1; transform: none; } }

/* ── SOUND PANEL ── */
#sound-panel {
  position: fixed; top: var(--bar-h); right: 0; z-index: 199;
  width: 280px;
  background: var(--bg);
  border-left: .5px solid var(--border);
  border-bottom: .5px solid var(--border);
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.16,1,.3,1);
  font-family: var(--font);
}
#sound-panel.open { transform: translateX(0); }

#sound-panel-inner { padding: 20px 22px 22px; }

.sp-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 20px;
}
.sp-title {
  font-size: 10px; letter-spacing: .13em; text-transform: uppercase; color: var(--mid);
}
.sp-close {
  font-family: var(--font); font-size: 11px;
  background: none; border: none; cursor: pointer;
  color: var(--mid); padding: 0;
  text-underline-offset: 3px;
}
.sp-close:hover { color: var(--ink); text-decoration: underline; }

.sp-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.sp-label {
  font-size: 9px; letter-spacing: .10em; text-transform: uppercase;
  color: var(--mid); width: 52px; flex-shrink: 0;
}
.sp-range {
  flex: 1; height: 1px; cursor: pointer;
  -webkit-appearance: none; appearance: none;
  background: var(--border); outline: none;
  border-radius: 0;
}
.sp-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--ink); cursor: pointer;
  transition: background .15s;
}
.sp-range::-moz-range-thumb {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--ink); border: none; cursor: pointer;
}
.sp-val {
  font-size: 9px; color: var(--mid); width: 36px; text-align: right; flex-shrink: 0;
}
.sp-seg {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.sp-seg-btn {

.sp-seg-btn:hover { color: var(--ink); border-color: var(--ink); }

.sp-test {

<script>
// ── SOUND PANEL ──────────────────────────────────────────────────────────
function toggleSoundPanel() {
  var p    = document.getElementById('sound-panel');
  var sBtn = document.getElementById('btn-sound-settings');
  var open = p.classList.toggle('open');
  p.setAttribute('aria-hidden', String(!open));
  if (sBtn) sBtn.classList.toggle('panel-open', open);
}

// Single delegated listener for the whole panel
function initSoundPanel() {
  var panel = document.getElementById('sound-panel');
  if (!panel) return;

  panel.addEventListener('click', function(e) {
    var btn    = e.target.closest('[data-val]');
    var action = e.target.closest('[data-action]');
    if (action) {
      if (action.getAttribute('data-action') === 'close') { toggleSoundPanel(); return; }
      if (action.getAttribute('data-action') === 'test')  { Sound.test(); return; }
    }
    if (!btn) return;
    var seg = btn.closest('[data-param]');
    if (!seg) return;
    var raw   = btn.getAttribute('data-val');
    var param = seg.getAttribute('data-param');
    var val   = isNaN(raw) ? raw : parseFloat(raw);
    Sound.params[param] = val;
    if (param === 'filmRoot') {
      Sound.params.roots['sec-film'] = val;
      Sound.params.roots['sec-comm'] = val * 0.667;
      Sound.params.roots['sec-ev']   = val * 0.75;
      Sound.params.roots['sec-edu']  = val * 0.889;
    }
    seg.querySelectorAll('.sp-seg-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  });

  panel.addEventListener('input', function(e) {
    var el = e.target;
    if (el.tagName !== 'INPUT') return;
    var param = el.getAttribute('data-param');
    var val   = parseFloat(el.value);
    Sound.params[param] = val;
    var fmt = {
      gain:   function(v){ return Math.round(v*100)+'%'; },
      attack: function(v){ return Math.round(v*1000)+'ms'; },
      decay:  function(v){ return v.toFixed(1)+'s'; },
      detune: function(v){ return (v>0?'+':'')+Math.round(v)+'¢'; }
    };
    var lbl = document.getElementById('sp-'+param+'-val');
    if (lbl && fmt[param]) lbl.textContent = fmt[param](val);
  });
}
initSoundPanel();

// ── SOUND SYSTEM ──────────────────────────────────────────────────────────
// Harmonic series rooted on A2 (110Hz). Each film row = a partial.
// Commercial, Events, Edu rows use a different root (D2 = 73.4Hz).
// Notes layer as you hover more rows, dissolve on mouseleave.
// All gains are low — this is texture, not music.

var soundEnabled = false;

function toggleSound() {
  soundEnabled = !soundEnabled;
  var btn = document.getElementById('btn-sound');
  btn.textContent = 'Sound: ' + (soundEnabled ? 'On' : 'Off');
  btn.classList.toggle('sound-on', soundEnabled);
  if (!soundEnabled) Sound.stopAll();
}

const Sound = (function() {
  var ctx = null;
  var activeNodes = new Map();
  var PARTIALS = [1, 2, 1.5, 1.25, 1.75, 2.25, 1.333, 1.667];

  var params = {
    wave:    'sine',
    gain:    0.12,
    attack:  0.18,
    decay:   1.6,
    detune:  0,
    filmRoot: 110,
    roots: {
      'sec-film':  110.00,
      'sec-comm':   73.42,
      'sec-ev':     82.41,
      'sec-edu':    98.00
    }
  };

  function boot() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function getRoot(row) {
    var sec = row.closest('.cv-section');
    return sec ? (params.roots[sec.id] || 110) : 110;
  }

  function getPartialIndex(row) {
    var rows = Array.from(row.closest('tbody').querySelectorAll('tr'));
    return rows.indexOf(row) % PARTIALS.length;
  }

  function play(row) {
    if (!soundEnabled || activeNodes.has(row)) return;
    boot();
    function go() {
      var freq = getRoot(row) * PARTIALS[getPartialIndex(row)];
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = params.wave;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.detune.setValueAtTime(params.detune, ctx.currentTime);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(params.gain, ctx.currentTime + params.attack);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      activeNodes.set(row, { osc: osc, gain: gain });
    }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  function stop(row) {
    if (!activeNodes.has(row)) return;
    var node = activeNodes.get(row);
    var t = ctx.currentTime;
    node.gain.gain.setValueAtTime(node.gain.gain.value, t);
    node.gain.gain.exponentialRampToValueAtTime(0.0001, t + params.decay);
    node.osc.stop(t + params.decay + 0.1);
    activeNodes.delete(row);
  }

  function stopAll() {
    activeNodes.forEach(function(_, row) { stop(row); });
  }

  function test() {
    boot();
    function go() {
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = params.wave;
      osc.frequency.setValueAtTime(params.filmRoot, ctx.currentTime);
      osc.detune.setValueAtTime(params.detune, ctx.currentTime);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(params.gain, ctx.currentTime + params.attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + params.attack + params.decay);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + params.attack + params.decay + 0.1);
    }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  return { play: play, stop: stop, stopAll: stopAll, test: test, params: params };
})();

function attachTableSound() {
  document.querySelectorAll('.cv-table tbody tr').forEach(row => {
    // Avoid double-binding
    if (row.dataset.soundBound) return;
    row.dataset.soundBound = '1';

    row.addEventListener('mouseenter', () => Sound.play(row));
    row.addEventListener('mouseleave', () => Sound.stop(row));
  });

  // Stop all notes when mouse leaves any table
  document.querySelectorAll('.cv-table').forEach(tbl => {
    tbl.addEventListener('mouseleave', () => Sound.stopAll());
  });
}

// ── Preferences (run before DOMContentLoaded to avoid flash) ──
if (localStorage.getItem('ec-dark') === '1')
  document.documentElement.classList.add('dark');

const _hiddenOnLoad = new Set(
  Object.entries(JSON.parse(localStorage.getItem('ec-hidden') || '{}'  ))
    .filter(([,v]) => v).map(([k]) => k)
);

// ── Dark mode ──────────────────────────────────────────────────
function toggleDark() {
  const on = document.documentElement.classList.toggle('dark');
  localStorage.setItem('ec-dark', on ? '1' : '0');
}

// ── Section hide/show ──────────────────────────────────────────
function toggleSection(id) {
  const sec = document.getElementById(id);
  if (!sec) return;
  const hidden = sec.classList.toggle('sec-hidden');
  sec.querySelector('.sec-toggle').textContent = hidden ? 'Show' : 'Hide';
  const state = JSON.parse(localStorage.getItem('ec-hidden') || '{}');
  state[id] = hidden;
  localStorage.setItem('ec-hidden', JSON.stringify(state));
}

// ── Scroll reveal ──────────────────────────────────────────────
function initScrollReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        en.target.classList.add('visible');
        obs.unobserve(en.target);
      }
    });
  }, { threshold: 0.07, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.cv-section').forEach(el => obs.observe(el));
}

// ── Helpers ────────────────────────────────────────────────────
function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function parseInline(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_(.+?)_/g, '<em>$1</em>');
}

// Split a table row on | but respect \| escaped pipes
function splitRow(line) {
  // Replace \| temporarily, split, then restore
  const tmp = line.replace(/\\\|/g, '\x00PIPE\x00');
  const inner = tmp.replace(/^\s*\|\s*|\s*\|\s*$/g, '');
  return inner.split('|').map(c => c.replace(/\x00PIPE\x00/g, '|').trim());
}

// Format a cell: **Bold** becomes title, rest becomes subtitle
function formatCell(text) {
  const m = text.match(/^\*\*(.+?)\*\*\s*[·\-–]?\s*(.*)/);
  if (m) {
    const title = m[1].trim();
    const sub   = m[2].trim();
    return `<span class="ent-title">${parseInline(title)}</span>` +
           (sub ? `<span class="ent-sub">${parseInline(sub)}</span>` : '');
  }
  return parseInline(text);
}

function isSeparatorRow(line) {
  return /^\s*\|?\s*[-:]+[-| :]*$/.test(line);
}

// ── Table builder ──────────────────────────────────────────────
function buildTable(headers, rows) {
  const hl = headers.map(h => h.toLowerCase());
  const isFilm = hl.includes('status');

  // Column CSS classes
  const cls = headers.map(h => {
    switch (h.toLowerCase()) {
      case 'status':      return 'col-status';
      case 'festivals':   return 'col-festivals hide-mobile';
      case 'awards':      return 'col-awards hide-mobile';
      case 'support':     return 'col-support hide-mobile';
      default:            return '';
    }
  });

  let out = '<div class="table-wrap"><table class="cv-table"><thead><tr>';
  headers.forEach((h, i) => {
    const c = cls[i] ? ` class="${cls[i]}"` : '';
    out += `<th${c}>${h.toLowerCase() === 'status' ? '' : parseInline(h)}</th>`;
  });
  out += '</tr></thead><tbody>';

  rows.forEach(cells => {
    out += '<tr>';
    headers.forEach((h, i) => {
      const cell = (cells[i] || '').trim();
      const c = cls[i] ? ` class="${cls[i]}"` : '';
      const lh = h.toLowerCase();

      if (lh === 'status') {
        const done = cell.toLowerCase() === 'done';
        out += `<td${c}><span class="dot ${done ? 'dot-done' : 'dot-wip'}"></span></td>`;
      } else if (lh === 'project' || lh === 'company' || lh === 'event' || lh === 'institution') {
        out += `<td${c}>${formatCell(cell)}</td>`;
      } else {
        out += `<td${c}>${parseInline(cell)}</td>`;
      }
    });
    out += '</tr>';
  });

  out += '</tbody></table></div>';
  return out;
}

// ── Frontmatter parser ─────────────────────────────────────────
function parseFrontmatter(raw) {
  const m = raw.match(/^\s*---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  const meta = {};
  m[1].split('\n').forEach(line => {
    const colon = line.indexOf(':');
    if (colon < 0) return;
    meta[line.slice(0, colon).trim()] = line.slice(colon + 1).trim();
  });
  return { meta, body: m[2] };
}

// ── Main render ────────────────────────────────────────────────
async function render() {
  let raw = '';
  try {
    const res = await fetch('content.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    raw = await res.text();
  } catch (err) {
    console.error('Could not load content.md:', err);
    document.getElementById('cv-bio').innerHTML =
      '<p>Could not load <code>content.md</code>. This site must be served over HTTP — run <code>python3 -m http.server</code> in this folder, or use Live Server.</p>';
    return;
  }
  const { meta, body } = parseFrontmatter(raw);

  // ── Meta fields ──
  if (meta.photo) document.getElementById('cv-photo').src = meta.photo;
  if (meta.subtitle) document.getElementById('cv-subtitle').textContent = meta.subtitle;
  if (meta.location) document.getElementById('cv-footer').textContent   = meta.location;

  if (meta.email) {
    document.getElementById('cv-contact').innerHTML =
      `<a href="mailto:${meta.email}">${meta.email}</a>`;
  }

  // ── Parse body lines ──
  const lines = body.split('\n');
  let name        = '';
  let bioParts    = [];   // strings + '' for blank lines
  let sections    = [];
  let cur         = null; // current section
  let tblHeaders  = null;
  let tblRows     = [];

  function flushTable() {
    if (cur && tblHeaders) {
      cur.tables.push({ headers: tblHeaders, rows: tblRows });
    }
    tblHeaders = null; tblRows = [];
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // H1 = name
    if (trimmed.startsWith('# ') && !trimmed.startsWith('## ')) {
      name = trimmed.slice(2).trim();
      continue;
    }

    // H2 = new section
    if (trimmed.startsWith('## ')) {
      flushTable();
      if (cur) sections.push(cur);
      cur = { title: trimmed.slice(3).trim(), tables: [], paras: [] };
      continue;
    }

    // Table row
    if (trimmed.startsWith('|')) {
      const next = (lines[i + 1] || '').trim();
      if (!tblHeaders && isSeparatorRow(lines[i + 1] || '')) {
        // Header row
        tblHeaders = splitRow(trimmed);
        i++; // skip separator
        continue;
      } else if (tblHeaders && !isSeparatorRow(trimmed)) {
        tblRows.push(splitRow(trimmed));
        continue;
      }
    } else if (tblHeaders) {
      flushTable();
    }

    // Blank line
    if (!trimmed) {
      if (!cur) bioParts.push('');
      continue;
    }

    // Paragraph text
    if (!trimmed.startsWith('#')) {
      if (!cur) bioParts.push(trimmed);
      else      cur.paras.push(trimmed);
    }
  }
  flushTable();
  if (cur) sections.push(cur);

  // ── Set name ──
  document.getElementById('cv-name').textContent = name;
  document.getElementById('toolbar-name').textContent = name;
  document.title = name + (meta.subtitle ? ' — ' + meta.subtitle : '');

  // ── Render bio: split on blank lines into <p> tags ──
  const bioParas = [];
  let para = [];
  bioParts.forEach(part => {
    if (part === '') {
      if (para.length) { bioParas.push(para.join(' ')); para = []; }
    } else {
      para.push(part);
    }
  });
  if (para.length) bioParas.push(para.join(' '));
  document.getElementById('cv-bio').innerHTML =
    bioParas.map(p => `<p>${parseInline(p)}</p>`).join('');

  // ── Render sections ──
  document.getElementById('cv-sections').innerHTML = sections.map(sec => {
    const id    = `sec-${slugify(sec.title)}`;
    const tbls  = sec.tables.map(t => buildTable(t.headers, t.rows)).join('');
    const paras = sec.paras.map(p => `<p>${parseInline(p)}</p>`).join('');
    return `<section class="cv-section" id="${id}">
      <div class="sec-head">
        <span class="sec-label">${parseInline(sec.title)}</span>
        <button class="sec-toggle" onclick="toggleSection('${id}')">Hide</button>
      </div>
      <div class="sec-body">${tbls}${paras}</div>
    </section>`;
  }).join('');

  // ── Restore hidden sections ──
  _hiddenOnLoad.forEach(id => {
    const sec = document.getElementById(id);
    if (!sec) return;
    sec.classList.add('sec-hidden');
    const btn = sec.querySelector('.sec-toggle');
    if (btn) btn.textContent = 'Show';
  });

  // ── Init scroll animations ──
  requestAnimationFrame(initScrollReveal);
  requestAnimationFrame(attachTableSound);
}
