<script>
// ── SOUND PANEL ──────────────────────────────────────────────────────────
var soundFmt = {
  gain:      function(v){ return Math.round(v * 100) + '%'; },
  attack:    function(v){ return Math.round(v * 1000) + 'ms'; },
  decay:     function(v){ return v.toFixed(1) + 's'; },
  detune:    function(v){ return (v > 0 ? '+' : '') + Math.round(v) + '¢'; },
  bpm:       function(v){ return Math.round(v); },
  kickGain:  function(v){ return Math.round(v * 100) + '%'; },
  clapGain:  function(v){ return Math.round(v * 100) + '%'; },
  bassGain:  function(v){ return Math.round(v * 100) + '%'; },
  noteGain:  function(v){ return Math.round(v * 100) + '%'; },
  swing:     function(v){ return Math.round(v * 100) + '%'; },
  reverbAmt: function(v){ return Math.round(v * 100) + '%'; }
};

var SOUND_SCHEMA_V = 2;
var MIDI_BANK_SLUGS = ['film-immersive-work', 'commercial-production'];
var LEGACY_SECTION_IDS = {
  'sec-film': 'sec-film-immersive-work',
  'sec-comm': 'sec-commercial-production',
  'sec-ev':   'sec-events-jury',
  'sec-edu':  'sec-education-languages'
};

var SECTION_ROOT_KEYS = {
  filmRoot: 'sec-film-immersive-work',
  commRoot: 'sec-commercial-production',
  evRoot:   'sec-events-jury',
  eduRoot:  'sec-education-languages'
};

function canonicalSectionId(id) {
  return LEGACY_SECTION_IDS[id] || id;
}

function migrateSoundPrefs(raw) {
  if (!raw) return raw;
  if (!raw.params) return Object.assign({ v: SOUND_SCHEMA_V }, raw);
  var p = raw.params;
  if (!raw.v || raw.v < SOUND_SCHEMA_V) {
    Object.keys(LEGACY_SECTION_IDS).forEach(function(oldId) {
      var newId = LEGACY_SECTION_IDS[oldId];
      if (p.roots && p.roots[oldId] != null && p.roots[newId] == null) {
        p.roots[newId] = p.roots[oldId];
      }
    });
    ['patterns', 'trackTypes', 'trackMutes', 'trackSolos', 'trackLocks'].forEach(function(key) {
      if (!p[key]) return;
      Object.keys(p[key]).slice().forEach(function(tid) {
        Object.keys(LEGACY_SECTION_IDS).forEach(function(oldId) {
          var prefix = oldId + '-';
          if (tid.indexOf(prefix) === 0) {
            var newTid = LEGACY_SECTION_IDS[oldId] + tid.slice(oldId.length);
            if (p[key][newTid] == null) p[key][newTid] = p[key][tid];
          }
        });
      });
    });
    raw.v = SOUND_SCHEMA_V;
  }
  return raw;
}

function setSectionRoot(param, val) {
  var secId = SECTION_ROOT_KEYS[param];
  if (!secId) return;
  Sound.params.roots[secId] = val;
  Sound.params[param] = val;
  if (param === 'filmRoot') Sound.params.filmRoot = val;
}

function setFilmRoot(val) {
  setSectionRoot('filmRoot', val);
}

function updateSoundParamLabel(param, val) {
  var lbl = document.getElementById('sp-' + param + '-val');
  if (lbl && soundFmt[param]) lbl.textContent = soundFmt[param](val);
}

var SOUND_BOOL_PARAMS = [
  'kick', 'kickRepeat', 'kickMinimal', 'humanize',
  'quantizeNotes', 'bassFifth', 'sidechain', 'reverb'
];

function syncSoundPanelUI() {
  var panel = document.getElementById('sound-panel');
  if (!panel) return;
  var p = Sound.params;
  panel.querySelectorAll('.sp-seg[data-param]').forEach(function(seg) {
    var param = seg.getAttribute('data-param');
    var val = p[param];
    if (SOUND_BOOL_PARAMS.indexOf(param) >= 0) val = val ? '1' : '0';
    seg.querySelectorAll('.sp-seg-btn').forEach(function(b) {
      var raw = b.getAttribute('data-val');
      var match;
      if (SOUND_BOOL_PARAMS.indexOf(param) >= 0) match = raw === val;
      else if (isNaN(raw)) match = raw === val;
      else match = Math.abs(parseFloat(raw) - Number(val)) < 0.02;
      b.classList.toggle('active', match);
    });
  });
  panel.querySelectorAll('input.sp-range[data-param]').forEach(function(input) {
    var param = input.getAttribute('data-param');
    if (p[param] === undefined) return;
    input.value = String(p[param]);
    updateSoundParamLabel(param, p[param]);
  });
}

function saveSoundPrefs() {
  try {
    localStorage.setItem('ec-sound', JSON.stringify({
      v: SOUND_SCHEMA_V,
      enabled: soundEnabled,
      params: JSON.parse(JSON.stringify(Sound.params))
    }));
  } catch (e) {}
}

function loadSoundPrefs() {
  try {
    var stored = JSON.parse(localStorage.getItem('ec-sound') || 'null');
    var needsSave = !!(stored && (!stored.v || stored.v < SOUND_SCHEMA_V));
    var raw = migrateSoundPrefs(stored);
    if (!raw) return;
    if (raw.params) {
      var defaults = Sound.params;
      Object.assign(Sound.params, raw.params);
      Sound.params.roots = Object.assign({}, defaults.roots, raw.params.roots || {});
      Object.keys(LEGACY_SECTION_IDS).forEach(function(oldId) {
        var newId = LEGACY_SECTION_IDS[oldId];
        if (Sound.params.roots[oldId] != null && Sound.params.roots[newId] == null) {
          Sound.params.roots[newId] = Sound.params.roots[oldId];
        }
      });
      if (raw.params.filmRoot != null) setSectionRoot('filmRoot', raw.params.filmRoot);
      ['commRoot', 'evRoot', 'eduRoot'].forEach(function(key) {
        if (raw.params[key] != null) setSectionRoot(key, raw.params[key]);
        else if (Sound.params.roots[SECTION_ROOT_KEYS[key]] != null) {
          Sound.params[key] = Sound.params.roots[SECTION_ROOT_KEYS[key]];
        }
      });
      SOUND_BOOL_PARAMS.forEach(function(key) {
        if (raw.params[key] != null) Sound.params[key] = !!raw.params[key];
      });
      if (raw.params.mode) Sound.params.mode = raw.params.mode;
      if (raw.params.bpm) Sound.params.bpm = raw.params.bpm;
      if (Sound.params.clapGain == null) {
        Sound.params.clapGain = (Sound.params.kickGain || 0.18) * 0.78;
      }
      if (Sound.params.bassGain == null) {
        Sound.params.bassGain = (Sound.params.gain || 0.12) * 0.85;
      }
      if (Sound.params.noteGain == null) {
        Sound.params.noteGain = (Sound.params.gain || 0.12) * 0.62;
      }
      if (Sound.params.swing == null) Sound.params.swing = 0.54;
      if (Sound.params.humanize == null) Sound.params.humanize = false;
      if (!Sound.params.trackMutes) Sound.params.trackMutes = {};
      if (!Sound.params.trackSolos) Sound.params.trackSolos = {};
      if (!Sound.params.trackLocks) Sound.params.trackLocks = {};
      if (Sound.params.quantizeNotes == null) Sound.params.quantizeNotes = true;
      if (!Sound.params.scaleType) Sound.params.scaleType = 'major';
      if (!Sound.params.drumRack) Sound.params.drumRack = 'kickClap';
      if (Sound.params.bassFifth == null) Sound.params.bassFifth = true;
      if (Sound.params.sidechain == null) Sound.params.sidechain = true;
      if (Sound.params.noteLength == null) Sound.params.noteLength = 0.72;
      if (Sound.params.reverb == null) Sound.params.reverb = true;
      if (Sound.params.reverbAmt == null) Sound.params.reverbAmt = 0.14;
      if (Sound.params.commRoot == null) Sound.params.commRoot = Sound.params.roots['sec-comm'];
      if (Sound.params.evRoot == null) Sound.params.evRoot = Sound.params.roots['sec-ev'];
      if (Sound.params.eduRoot == null) Sound.params.eduRoot = Sound.params.roots['sec-edu'];
    }
    soundEnabled = !!raw.enabled;
    syncMusicBtn();
    syncSoundPanelUI();
    applySoundMode();
    if (soundEnabled && typeof Sound.syncKick === 'function') Sound.syncKick();
    if (needsSave) saveSoundPrefs();
  } catch (e) {}
}

function toggleSoundPanel() {
  var p    = document.getElementById('sound-panel');
  var sBtn = document.getElementById('btn-sound-settings');
  var open = p.classList.toggle('open');
  p.setAttribute('aria-hidden', String(!open));
  if (sBtn) sBtn.classList.toggle('panel-open', open);
  if (open) syncSoundPanelUI();
}

function initSoundPanel() {
  var panel = document.getElementById('sound-panel');
  if (!panel) return;

  panel.addEventListener('click', function(e) {
    var btn    = e.target.closest('[data-val]');
    var action = e.target.closest('[data-action]');
    if (action) {
      if (action.getAttribute('data-action') === 'close') { toggleSoundPanel(); return; }
      if (action.getAttribute('data-action') === 'test')  { Sound.test(); return; }
    }
    if (!btn) return;
    var seg = btn.closest('[data-param]');
    if (!seg) return;
    var raw   = btn.getAttribute('data-val');
    var param = seg.getAttribute('data-param');
    var val;
    if (SOUND_BOOL_PARAMS.indexOf(param) >= 0) val = raw === '1';
    else if (isNaN(raw)) val = raw;
    else val = parseFloat(raw);
    if (SECTION_ROOT_KEYS[param]) setSectionRoot(param, val);
    else if (param === 'noteLength') Sound.params.noteLength = val;
    else Sound.params[param] = val;
    seg.querySelectorAll('.sp-seg-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    if (param === 'kick' || param === 'kickRepeat' || param === 'kickMinimal' || param === 'bpm') {
      Sound.syncKick();
    }
    if (param === 'steps') {
      document.documentElement.dataset.steps = String(Sound.params.steps);
      if (soundEnabled) TrackSeq.remount();
    }
    saveSoundPrefs();
  });

  panel.addEventListener('input', function(e) {
    var el = e.target;
    if (el.tagName !== 'INPUT') return;
    var param = el.getAttribute('data-param');
    var val   = parseFloat(el.value);
    Sound.params[param] = val;
    updateSoundParamLabel(param, val);
    if (param === 'reverbAmt' && typeof Sound.setReverbAmt === 'function') {
      Sound.setReverbAmt(val);
    }
    if (param === 'bpm' || param === 'kickGain' || param === 'swing' ||
        param === 'clapGain' || param === 'bassGain' || param === 'noteGain') {
      if (param === 'bpm' || param === 'kickGain') Sound.syncKick();
      if (soundEnabled && (param === 'bpm' || param === 'swing')) TrackSeq.restartSeq();
    }
    saveSoundPrefs();
  });
}

// ── NAV VIBE ─────────────────────────────────────────────────────────────
// Visual ≠ audio sample rate. We draw a short spatial slice of the wave
// (frequency → how many cycles fit across the bar) and drift phase slowly
// in time (~0.3–0.6 Hz). Attack / decay mirror Sound.params.

const NavVibe = (function() {
  var wrap, path, notes = new Map(), rafId = null, t0 = 0, lastNow = 0;
  var W = 200, H = 24, MID = H / 2, PTS = 96;
  var REF_FREQ = 110;
  var NOTE_DELAY_MS = 80;
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function soundParams() {
    return (typeof Sound !== 'undefined' && Sound.params)
      ? Sound.params
      : { wave: 'sine', attack: 0.18, decay: 1.6 };
  }

  function init() {
    wrap = document.getElementById('nav-vibe');
    path = wrap && wrap.querySelector('.nav-vibe-path');
    setResting();
  }

  function waveVal(phase, type) {
    var p = phase * Math.PI * 2;
    switch (type) {
      case 'square':
        return Math.sign(Math.sin(p)) * 0.9;
      case 'triangle':
        return (Math.asin(Math.sin(p)) * 2 / Math.PI) * 0.9;
      case 'sawtooth': {
        var s = ((phase % 1) + 1) % 1;
        return (s * 2 - 1) * 0.9;
      }
      default:
        return Math.sin(p) * 0.9;
    }
  }

  function spatialCycles(freq) {
    return 1.4 * (freq / REF_FREQ);
  }

  function scrollHz(freq) {
    return 0.28 + 0.1 * Math.log2(freq / REF_FREQ + 1);
  }

  function setResting() {
    if (path) path.setAttribute('d', 'M0 ' + MID + ' L' + W + ' ' + MID);
  }

  function activeNotes() {
    var list = [];
    notes.forEach(function(note) {
      if (note.level > 0.01) list.push(note);
    });
    return list;
  }

  function buildPath(t) {
    var type = soundParams().wave;
    var live = activeNotes();
    if (!live.length) return 'M0 ' + MID + ' L' + W + ' ' + MID;

    var baseAmp = 5.5 + live.length * 0.7;
    var segs = [];

    for (var i = 0; i <= PTS; i++) {
      var x = (i / PTS) * W;
      var norm = i / PTS;
      var y = MID;
      live.forEach(function(note) {
        var phase = norm * spatialCycles(note.freq) + t * scrollHz(note.freq);
        y += waveVal(phase, type) * baseAmp * note.level / live.length;
      });
      segs.push((i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(2));
    }
    return segs.join(' ');
  }

  function updateEnvelopes(now, dt) {
    var p = soundParams();
    var toDelete = [];
    notes.forEach(function(note, row) {
      if (now < note.delayUntil) return;
      if (note.target > note.level) {
        var step = dt / Math.max(0.08, p.attack);
        note.level = Math.min(note.target, note.level + step);
      } else if (note.target < note.level) {
        var step = dt / Math.max(0.25, p.decay);
        note.level = Math.max(note.target, note.level - step);
        if (note.releasing && note.level <= 0.02) toDelete.push(row);
      }
    });
    toDelete.forEach(function(row) { notes.delete(row); });
  }

  function tick(now) {
    if (!path) { rafId = null; return; }
    var dt = lastNow ? Math.min(0.05, (now - lastNow) / 1000) : 0.016;
    lastNow = now;
    updateEnvelopes(now, dt);

    var live = activeNotes();
    var t = (now - t0) / 1000;

    if (!live.length && notes.size === 0) {
      setResting();
      wrap.classList.remove('active');
      rafId = null;
      lastNow = 0;
      return;
    }

    path.setAttribute('d', buildPath(t));
    wrap.classList.toggle('active', peakLevel() > 0.08);
    rafId = requestAnimationFrame(tick);
  }

  function peakLevel() {
    var peak = 0;
    notes.forEach(function(n) { if (n.level > peak) peak = n.level; });
    return peak;
  }

  function ensureLoop() {
    if (!rafId) {
      t0 = performance.now();
      lastNow = 0;
      rafId = requestAnimationFrame(tick);
    }
  }

  function noteOn(row, freq) {
    if (!path || reduceMotion) return;
    var now = performance.now();
    notes.set(row, {
      freq: freq,
      level: 0,
      target: 1,
      releasing: false,
      delayUntil: now + NOTE_DELAY_MS
    });
    ensureLoop();
  }

  function noteOff(row) {
    var note = notes.get(row);
    if (!note) return;
    note.target = 0;
    note.releasing = true;
    ensureLoop();
  }

  function reset() {
    notes.clear();
    setResting();
    if (wrap) wrap.classList.remove('active');
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    lastNow = 0;
  }

  function pulse(freq, ms) {
    if (!path || reduceMotion) return;
    var key = {};
    noteOn(key, freq);
    setTimeout(function() { noteOff(key); }, ms || 600);
  }

  return { init: init, noteOn: noteOn, noteOff: noteOff, reset: reset, pulse: pulse };
})();

// ── SOUND SYSTEM ──────────────────────────────────────────────────────────
// Each table row picks a harmonic partial of the section root (film A2, etc.).
// Hold: sustained tone while hovered. Arp: cycles partials at BPM. Kick: low sine thump.

var soundEnabled = false;

function musicBtnLabel() {
  return 'Music: ' + (soundEnabled ? 'On' : 'Off');
}

function syncMusicBtn() {
  var btn = document.getElementById('btn-sound');
  if (btn) {
    btn.textContent = musicBtnLabel();
    btn.classList.toggle('sound-on', soundEnabled);
  }
}

function applySoundMode() {
  document.documentElement.classList.toggle('sound-on', soundEnabled);
  document.documentElement.dataset.steps = String(Sound.params.steps || 16);
  if (soundEnabled) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    TrackSeq.mount();
    TrackSeq.syncPlayback();
    Sound.bootAudio();
  } else {
    TrackSeq.closeModuleMenus();
    TrackSeq.unmount();
    Sound.tableLeave();
  }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  syncMusicBtn();
  applySoundMode();
  saveSoundPrefs();
}

const Sound = (function() {
  var ctx = null;
  var masterBus = null;
  var musicBus = null;
  var reverbSend = null;
  var reverbGain = null;
  var limiterNode = null;
  var activeNodes = new Map();
  var kickTimer = null;
  var inTableZone = false;
  var PARTIALS = [1, 2, 1.5, 1.25, 1.75, 2.25, 1.333, 1.667];
  var SCALE_DEFS = {
    major: [0, 2, 4, 5, 7, 9, 11, 12, 14, 16, 17, 19, 21, 23, 24],
    minor: [0, 2, 3, 5, 7, 8, 10, 12, 14, 15, 17, 19, 20, 22, 24],
    pent:  [0, 2, 4, 7, 9, 12, 14, 17, 19, 21, 24, 26, 28, 31, 33]
  };

  var params = {
    wave:        'sine',
    gain:        0.12,
    attack:      0.18,
    decay:       1.6,
    detune:      0,
    mode:        'harmonic',
    bpm:         88,
    kick:        false,
    kickRepeat:  false,
    kickMinimal: true,
    kickGain:    0.18,
    clapGain:    0.14,
    bassGain:    0.16,
    noteGain:    0.10,
    swing:       0.54,
    humanize:    false,
    quantizeNotes: true,
    scaleType:   'major',
    drumRack:    'kickClap',
    bassFifth:   true,
    sidechain:   true,
    noteLength:  0.72,
    reverb:      true,
    reverbAmt:   0.14,
    steps:       16,
    patterns:    {},
    trackTypes:  {},
    trackMutes:  {},
    trackSolos:  {},
    trackLocks:  {},
    filmRoot:    110,
    commRoot:    73.42,
    evRoot:      82.41,
    eduRoot:     98.00,
    roots: {
      'sec-film-immersive-work':   110.00,
      'sec-commercial-production':  73.42,
      'sec-events-jury':            82.41,
      'sec-education-languages':    98.00
    }
  };

  function getScale() {
    return SCALE_DEFS[params.scaleType] || SCALE_DEFS.major;
  }

  function boot() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterBus = ctx.createGain();
    masterBus.gain.value = 0.95;
    musicBus = ctx.createGain();
    musicBus.gain.value = 1;
    musicBus.connect(masterBus);
    limiterNode = ctx.createDynamicsCompressor();
    limiterNode.threshold.value = -10;
    limiterNode.knee.value = 8;
    limiterNode.ratio.value = 10;
    limiterNode.attack.value = 0.002;
    limiterNode.release.value = 0.1;
    masterBus.connect(limiterNode);
    limiterNode.connect(ctx.destination);
  }

  function out() {
    boot();
    return masterBus;
  }

  function musicOut() {
    boot();
    return musicBus;
  }

  function ensureReverb() {
    if (reverbSend) return;
    var len = Math.floor(ctx.sampleRate * 0.32);
    var ir = ctx.createBuffer(2, len, ctx.sampleRate);
    for (var ch = 0; ch < 2; ch++) {
      var d = ir.getChannelData(ch);
      for (var i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.4);
      }
    }
    var conv = ctx.createConvolver();
    conv.buffer = ir;
    reverbSend = ctx.createGain();
    reverbSend.gain.value = 1;
    reverbGain = ctx.createGain();
    reverbGain.gain.value = params.reverbAmt;
    reverbSend.connect(conv);
    conv.connect(reverbGain);
    reverbGain.connect(masterBus);
  }

  function setReverbAmt(val) {
    params.reverbAmt = val;
    if (reverbGain) reverbGain.gain.value = val;
  }

  function wetSend(fromNode, amt) {
    if (!params.reverb) return;
    boot();
    ensureReverb();
    var send = ctx.createGain();
    send.gain.value = amt != null ? amt : params.reverbAmt;
    fromNode.connect(send);
    send.connect(reverbSend);
  }

  function midiFromFreq(freq) {
    return 69 + 12 * Math.log2(freq / 440);
  }

  function freqFromMidi(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  function triggerSidechain(t) {
    if (!params.sidechain) return;
    boot();
    var amt = 0.42;
    var atk = 0.006;
    var hold = 0.055;
    var rel = 0.14;
    var g = musicBus.gain;
    g.cancelScheduledValues(t);
    g.setValueAtTime(g.value, t);
    g.linearRampToValueAtTime(amt, t + atk);
    g.linearRampToValueAtTime(1, t + atk + hold + rel);
  }

  function bootAudio() {
    boot();
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }

  function getRoot(row) {
    var sec = row.closest('.cv-section');
    if (!sec) return 110;
    var id = canonicalSectionId(sec.id);
    return params.roots[id] || params.roots[sec.id] || 110;
  }

  function getPartialIndex(row) {
    var rows = Array.from(row.closest('tbody').querySelectorAll('tr'));
    return rows.indexOf(row) % PARTIALS.length;
  }

  function rowFreq(row, partialIdx) {
    var idx = partialIdx != null ? partialIdx : getPartialIndex(row);
    return getRoot(row) * PARTIALS[idx % PARTIALS.length];
  }

  function noteFreq(row, partialIdx) {
    if (!params.quantizeNotes) return rowFreq(row, partialIdx);
    var idx = partialIdx != null ? partialIdx : getPartialIndex(row);
    var rootMidi = Math.round(midiFromFreq(getRoot(row)));
    var scale = getScale();
    var semitone = scale[idx % scale.length];
    return freqFromMidi(rootMidi + semitone);
  }

  function stepMs() {
    return (60000 / params.bpm) / 2;
  }

  function beatMs() {
    return 60000 / params.bpm;
  }

  function stopKickLoop() {
    if (kickTimer) { clearInterval(kickTimer); kickTimer = null; }
  }

  function velMult(velocity) {
    return velocity === 2 ? 0.45 : 1;
  }

  function playKick(force, velocity) {
    if (!soundEnabled) return;
    if (!force && !params.kick) return;
    boot();
    var t = ctx.currentTime;
    var min = params.kickMinimal;
    var peak = params.kickGain * (min ? 0.88 : 1) * velMult(velocity);
    var tail = min ? 0.09 : 0.15;
    var bus = out();

    var clickLen = Math.max(2, Math.floor(ctx.sampleRate * 0.0025));
    var clickBuf = ctx.createBuffer(1, clickLen, ctx.sampleRate);
    var cd = clickBuf.getChannelData(0);
    for (var ci = 0; ci < clickLen; ci++) cd[ci] = Math.random() * 2 - 1;
    var click = ctx.createBufferSource();
    click.buffer = clickBuf;
    var clickHp = ctx.createBiquadFilter();
    clickHp.type = 'highpass';
    clickHp.frequency.value = 1800;
    var clickG = ctx.createGain();
    clickG.gain.setValueAtTime(peak * 0.42, t);
    clickG.gain.exponentialRampToValueAtTime(0.001, t + 0.003);
    click.connect(clickHp);
    clickHp.connect(clickG);
    clickG.connect(bus);
    click.start(t);
    click.stop(t + 0.004);

    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    var f0 = min ? 68 : 56;
    var fMid = min ? 54 : 44;
    var fEnd = min ? 46 : 36;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f0, t);
    osc.frequency.exponentialRampToValueAtTime(fMid, t + 0.028);
    osc.frequency.exponentialRampToValueAtTime(fEnd, t + tail);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(peak, t + 0.001);
    gain.gain.setValueAtTime(peak * 0.9, t + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.001, t + tail);
    osc.connect(gain);
    gain.connect(bus);
    osc.start(t);
    osc.stop(t + tail + 0.02);
    triggerSidechain(t);
  }

  function syncKick() {
    stopKickLoop();
    if (!params.kick || !params.kickRepeat || !soundEnabled || !inTableZone) return;
    boot();
    function start() {
      playKick();
      kickTimer = setInterval(function() {
        if (!params.kick || !params.kickRepeat || !soundEnabled) {
          stopKickLoop();
          return;
        }
        playKick();
      }, beatMs());
    }
    ctx.state === 'suspended' ? ctx.resume().then(start) : start();
  }

  function tableEnter() {
    inTableZone = true;
    if (!soundEnabled) syncKick();
  }

  function tableLeave() {
    inTableZone = false;
    stopKickLoop();
    if (!soundEnabled) stopAll();
  }

  var clapBursts = null;
  function ensureClapBursts() {
    if (clapBursts) return;
    clapBursts = [
      { dur: 0.028, decay: 0.26 },
      { dur: 0.022, decay: 0.32 },
      { dur: 0.048, decay: 0.2 }
    ].map(function(spec) {
      var len = Math.floor(ctx.sampleRate * spec.dur);
      var buf = ctx.createBuffer(1, len, ctx.sampleRate);
      var d = buf.getChannelData(0);
      for (var i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (len * spec.decay));
      }
      return buf;
    });
  }

  function playClap(velocity) {
    if (!soundEnabled) return;
    boot();
    ensureClapBursts();
    var t = ctx.currentTime;
    var bus = out();
    var peak = params.clapGain * velMult(velocity);
    var offsets = [0, 0.009, 0.022];
    var levels = [1, 0.68, 0.48];

    offsets.forEach(function(off, i) {
      var src = ctx.createBufferSource();
      src.buffer = clapBursts[i];
      var hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 420;
      var bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1450;
      bp.Q.value = 0.75;
      var gain = ctx.createGain();
      var st = t + off;
      gain.gain.setValueAtTime(0, st);
      gain.gain.linearRampToValueAtTime(peak * levels[i], st + 0.0015);
      gain.gain.exponentialRampToValueAtTime(0.001, st + 0.07);
      src.connect(hp);
      hp.connect(bp);
      bp.connect(gain);
      gain.connect(bus);
      wetSend(gain, params.reverbAmt * 0.85);
      src.start(st);
      src.stop(st + 0.08);
    });
  }

  function startTone(freq) {
    var osc  = ctx.createOscillator();
    var gain = ctx.createGain();
    var t = ctx.currentTime;
    osc.type = params.wave;
    osc.frequency.setValueAtTime(freq, t);
    osc.detune.setValueAtTime(params.detune, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(params.gain, t + params.attack);
    osc.connect(gain);
    gain.connect(musicOut());
    osc.start();
    return { osc: osc, gain: gain };
  }

  function stopArpVoice(state, t) {
    if (!state.osc) return;
    try {
      state.gain.gain.cancelScheduledValues(t);
      state.gain.gain.setValueAtTime(Math.max(state.gain.gain.value, 0.0001), t);
      state.gain.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
      state.osc.stop(t + 0.04);
    } catch (e) {}
    state.osc = null;
    state.gain = null;
  }

  function startArpeggio(row) {
    var step = 0;
    var vibeKey = 'arp-' + row;
    var state = { arpeggio: true, timer: null, osc: null, gain: null };

    function tick() {
      var freq = noteFreq(row, step % PARTIALS.length);
      NavVibe.noteOn(vibeKey + '-' + step, freq);
      setTimeout(function() { NavVibe.noteOff(vibeKey + '-' + step); }, stepMs() * 0.85);
      bootAudio();
      boot();
      function go() {
        var t = ctx.currentTime;
        var dur = stepMs() / 1000;
        stopArpVoice(state, t);
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        var arpGain = params.gain * 0.62;
        osc.type = params.wave;
        osc.frequency.setValueAtTime(freq, t);
        osc.detune.setValueAtTime(params.detune, t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(arpGain, t + Math.min(params.attack, dur * 0.28));
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.82);
        osc.connect(gain);
        gain.connect(musicOut());
        osc.start(t);
        osc.stop(t + dur);
        state.osc = osc;
        state.gain = gain;
      }
      ctx.state === 'suspended' ? ctx.resume().then(go) : go();
      step++;
    }

    tick();
    state.timer = setInterval(tick, stepMs());
    activeNodes.set(row, state);
  }

  function play(row) {
    if (activeNodes.has(row)) return;
    if (params.mode === 'arpeggio') {
      startArpeggio(row);
      return;
    }
    var freq = noteFreq(row);
    NavVibe.noteOn(row, freq);
    bootAudio();
    boot();
    function go() {
      activeNodes.set(row, startTone(freq));
    }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  function stop(row) {
    if (!activeNodes.has(row)) return;
    var node = activeNodes.get(row);
    if (node.arpeggio) {
      clearInterval(node.timer);
      if (ctx) stopArpVoice(node, ctx.currentTime);
      activeNodes.delete(row);
      NavVibe.reset();
      return;
    }
    NavVibe.noteOff(row);
    var t = ctx.currentTime;
    node.gain.gain.setValueAtTime(node.gain.gain.value, t);
    node.gain.gain.exponentialRampToValueAtTime(0.0001, t + params.decay);
    node.osc.stop(t + params.decay + 0.1);
    activeNodes.delete(row);
  }

  function stopAll() {
    activeNodes.forEach(function(node) {
      if (node.arpeggio) {
        clearInterval(node.timer);
        if (ctx) stopArpVoice(node, ctx.currentTime);
      }
    });
    activeNodes.clear();
    stopKickLoop();
    NavVibe.reset();
  }

  function stepDur() {
    return (60 / params.bpm) / 4;
  }

  function stepDelayMs(stepIndex) {
    var base = stepDur() * 1000;
    var s = params.swing != null ? params.swing : 0.5;
    var off = (s - 0.5) * 1.2;
    return stepIndex % 2 === 0 ? base * (1 - off) : base * (1 + off);
  }

  function humanizeJitter() {
    if (!params.humanize) return 0;
    return (Math.random() * 6 + 2) * (Math.random() < 0.5 ? -1 : 1);
  }

  function playShortBlip(freq, role, velocity) {
    var t = ctx.currentTime;
    var stepLen = stepDur();
    var isBass = role === 'bass';
    var lenMult = isBass ? 0.78 : (params.noteLength != null ? params.noteLength : 0.72);
    var dur = stepLen * lenMult;
    var peak = (isBass ? params.bassGain : params.noteGain) * velMult(velocity);
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    var tail = ctx.createGain();
    osc.type = params.wave;
    osc.frequency.setValueAtTime(freq, t);
    osc.detune.setValueAtTime(params.detune, t);
    var atk = isBass
      ? Math.min(0.012, dur * 0.22)
      : Math.min(params.attack, dur * 0.35);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(peak, t + atk);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.92);
    if (isBass) {
      var lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.Q.value = 0.65;
      lp.frequency.setValueAtTime(Math.min(520, freq * 2.8), t);
      lp.frequency.exponentialRampToValueAtTime(Math.max(72, freq * 0.55), t + dur * 0.85);
      osc.connect(lp);
      lp.connect(gain);
    } else {
      osc.connect(gain);
    }
    gain.connect(tail);
    tail.connect(musicOut());
    if (!isBass) wetSend(tail, params.reverbAmt);
    osc.start(t);
    osc.stop(t + dur + 0.02);
  }

  function bassFreq(row) {
    var rootMidi = Math.round(midiFromFreq(getRoot(row)));
    if (params.bassFifth) {
      var idx = getPartialIndex(row) % 2;
      return freqFromMidi(rootMidi - 12 + (idx === 0 ? 0 : 7));
    }
    return freqFromMidi(rootMidi - 12);
  }

  function navFreqForTrack(type, row) {
    if (type === 'clap') return 420;
    if (type === 'kick') return 58;
    if (type === 'bass') return bassFreq(row);
    if (type === 'drums') return getRoot(row) * 0.5;
    return noteFreq(row);
  }

  function navPulseTrack(type, row, ms) {
    NavVibe.pulse(navFreqForTrack(type, row), ms || stepDur() * 1000 * 0.9);
  }

  function triggerTrack(type, row, preview, velocity) {
    var vel = velocity || 1;
    var vibeMs = stepDur() * 1000 * 0.9;
    navPulseTrack(type, row, vibeMs);
    if (type === 'kick') {
      playKick(!!preview, vel);
      return;
    }
    if (type === 'clap') {
      playClap(vel);
      return;
    }
    if (type === 'drums') {
      var rack = params.drumRack || 'kickClap';
      if (rack === 'kickClap' || rack === 'kick') {
        if (preview || params.kick) playKick(!!preview, vel);
      }
      if (rack === 'kickClap' || rack === 'clap') playClap(vel);
      return;
    }
    if (type === 'bass') {
      playShortBlip(bassFreq(row), 'bass', vel);
      return;
    }
    playShortBlip(noteFreq(row), 'note', vel);
  }

  function playTrackStep(type, row, velocity) {
    if (!soundEnabled) return;
    boot();
    function go() { triggerTrack(type, row, false, velocity); }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  function previewTrack(type, row, velocity) {
    if (!soundEnabled) return;
    bootAudio();
    boot();
    function go() { triggerTrack(type, row, true, velocity || 1); }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  function test() {
    NavVibe.pulse(params.filmRoot, (params.attack + params.decay) * 1000);
    if (!soundEnabled) return;
    boot();
    function go() {
      if (params.kick) playKick();
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      var t = ctx.currentTime;
      osc.type = params.wave;
      osc.frequency.setValueAtTime(params.filmRoot, t);
      osc.detune.setValueAtTime(params.detune, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(params.gain, t + params.attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + params.attack + params.decay);
      osc.connect(gain);
      gain.connect(out());
      osc.start();
      osc.stop(t + params.attack + params.decay + 0.1);
    }
    ctx.state === 'suspended' ? ctx.resume().then(go) : go();
  }

  return {
    play: play, stop: stop, stopAll: stopAll, test: test,
    syncKick: syncKick, tableEnter: tableEnter, tableLeave: tableLeave,
    playTrackStep: playTrackStep, previewTrack: previewTrack,
    stepDur: stepDur, stepDelayMs: stepDelayMs, humanizeJitter: humanizeJitter,
    navFreqForTrack: navFreqForTrack, setReverbAmt: setReverbAmt,
    bootAudio: bootAudio, params: params
  };
})();

// ── TRACK SEQ (rows = modular layers) ─────────────────────────────────────
const TrackSeq = (function() {
  var seqTimer = null;
  var seqRunning = false;
  var playhead = 0;
  var mounted = false;
  var previewTimer = null;
  var TYPES = ['drums', 'kick', 'bass', 'clap', 'note'];
  var TYPE_LABEL = {
    drums: 'Drums', kick: 'Kick', bass: 'Bass', clap: 'Clap', note: 'Note'
  };

  function stepCount() {
    return Sound.params.steps === 8 ? 8 : 16;
  }

  function rowIndex(row) {
    return Array.from(row.parentNode.children).indexOf(row);
  }

  function trackId(row) {
    var sec = row.closest('.cv-section');
    var sid = sec ? canonicalSectionId(sec.id) : 'sec';
    return sid + '-' + rowIndex(row);
  }

  function defaultType(idx) {
    if (idx === 0) return 'drums';
    if (idx === 1) return 'kick';
    if (idx === 2) return 'bass';
    if (idx === 3) return 'clap';
    return 'note';
  }

  function getType(id, idx) {
    var t = Sound.params.trackTypes[id] || defaultType(idx);
    return TYPES.indexOf(t) >= 0 ? t : defaultType(idx);
  }

  function normStep(val) {
    if (!val) return 0;
    return val === 2 ? 2 : 1;
  }

  function ensurePattern(id) {
    var n = stepCount();
    if (!Sound.params.patterns[id] || Sound.params.patterns[id].length !== n) {
      var old = Sound.params.patterns[id] || [];
      Sound.params.patterns[id] = new Array(n).fill(0);
      for (var i = 0; i < Math.min(old.length, n); i++) {
        Sound.params.patterns[id][i] = normStep(old[i]);
      }
    }
    return Sound.params.patterns[id];
  }

  function patternActive(pat) {
    return pat && pat.some(function(v) { return v; });
  }

  function syncStepButton(btn, val) {
    btn.classList.toggle('on', val > 0);
    btn.classList.toggle('soft', val === 2);
    btn.setAttribute('aria-pressed', val ? 'true' : 'false');
    btn.setAttribute('aria-label', (val === 2 ? 'Soft ' : val ? 'Loud ' : '') + 'step');
  }

  function syncLaneState(lane, pat) {
    lane.classList.toggle('has-notes', patternActive(pat));
  }

  function hasSolo() {
    var solos = Sound.params.trackSolos || {};
    return Object.keys(solos).some(function(k) { return solos[k]; });
  }

  function rowAudible(id) {
    if (Sound.params.trackMutes && Sound.params.trackMutes[id]) return false;
    if (hasSolo()) return !!(Sound.params.trackSolos && Sound.params.trackSolos[id]);
    return true;
  }

  function syncLaneMuteSolo(lane, id) {
    var muted = !!(Sound.params.trackMutes && Sound.params.trackMutes[id]);
    var solo = !!(Sound.params.trackSolos && Sound.params.trackSolos[id]);
    var locked = !!(Sound.params.trackLocks && Sound.params.trackLocks[id]);
    lane.classList.toggle('is-muted', muted);
    lane.classList.toggle('is-solo', solo);
    lane.classList.toggle('is-locked', locked);
    var muteBtn = lane.querySelector('.track-mute');
    var soloBtn = lane.querySelector('.track-solo');
    var lockBtn = lane.querySelector('.track-lock');
    if (muteBtn) {
      muteBtn.classList.toggle('active', muted);
      muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
    }
    if (soloBtn) {
      soloBtn.classList.toggle('active', solo);
      soloBtn.setAttribute('aria-pressed', solo ? 'true' : 'false');
    }
    if (lockBtn) {
      lockBtn.classList.toggle('active', locked);
      lockBtn.setAttribute('aria-pressed', locked ? 'true' : 'false');
    }
  }

  function paintStep(pat, stepIdx, soft) {
    var cur = pat[stepIdx] || 0;
    if (soft) {
      pat[stepIdx] = cur === 2 ? 0 : cur === 1 ? 2 : 2;
    } else {
      pat[stepIdx] = cur === 1 ? 0 : cur === 2 ? 1 : 1;
    }
    return pat[stepIdx];
  }

  function clearRow(lane, grid, pat) {
    pat.fill(0);
    grid.querySelectorAll('.track-step').forEach(function(btn) {
      syncStepButton(btn, 0);
    });
    syncLaneState(lane, pat);
    saveSoundPrefs();
  }

  function flashStep(lane, stepIndex) {
    var btn = lane.querySelector('.track-step[data-step="' + stepIndex + '"]');
    if (!btn || !btn.classList.contains('on')) return;
    btn.classList.add('hit');
    setTimeout(function() { btn.classList.remove('hit'); }, 100);
  }

  function closeModuleMenus() {
    document.querySelectorAll('.track-module-menu').forEach(function(el) { el.remove(); });
  }

  function syncLaneTypeUI(lane, type) {
    lane.dataset.trackType = type;
    lane.className = 'track-lane track-' + type +
      (lane.classList.contains('is-muted') ? ' is-muted' : '') +
      (lane.classList.contains('is-solo') ? ' is-solo' : '') +
      (lane.classList.contains('is-locked') ? ' is-locked' : '') +
      (lane.classList.contains('has-notes') ? ' has-notes' : '');
    var lbl = lane.querySelector('.track-label');
    if (lbl) lbl.textContent = TYPE_LABEL[type];
  }

  function setTrackType(id, row, lane, type) {
    if (Sound.params.trackLocks && Sound.params.trackLocks[id]) return;
    Sound.params.trackTypes[id] = type;
    row.dataset.trackType = type;
    syncLaneTypeUI(lane, type);
    saveSoundPrefs();
  }

  function openModuleMenu(id, row, lane, labelEl) {
    if (Sound.params.trackLocks && Sound.params.trackLocks[id]) return;
    closeModuleMenus();
    var menu = document.createElement('div');
    menu.className = 'track-module-menu';
    menu.setAttribute('role', 'menu');
    TYPES.forEach(function(t) {
      var item = document.createElement('button');
      item.type = 'button';
      item.className = 'track-module-opt' + (t === getType(id, rowIndex(row)) ? ' active' : '');
      item.textContent = TYPE_LABEL[t];
      item.setAttribute('role', 'menuitem');
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        setTrackType(id, row, lane, t);
        closeModuleMenus();
        if (soundEnabled) Sound.previewTrack(t, row);
      });
      menu.appendChild(item);
    });
    labelEl.appendChild(menu);
  }

  function buildLane(row) {
    if (row.querySelector('.track-lane')) return;
    var id = trackId(row);
    var idx = rowIndex(row);
    var type = getType(id, idx);
    var pat = ensurePattern(id);
    var lane = document.createElement('div');
    lane.className = 'track-lane track-' + type;
    lane.dataset.trackId = id;
    lane.dataset.trackType = type;

    var head = document.createElement('div');
    head.className = 'track-head';

    var label = document.createElement('button');
    label.type = 'button';
    label.className = 'track-label';
    label.textContent = TYPE_LABEL[type];
    label.title = 'Click: module menu · Double-click: clear row';

    label.addEventListener('click', function(e) {
      e.stopPropagation();
      if (e.target.closest('.track-module-menu')) return;
      openModuleMenu(id, row, lane, label);
    });
    label.addEventListener('dblclick', function(e) {
      e.preventDefault();
      e.stopPropagation();
      closeModuleMenus();
      clearRow(lane, grid, pat);
    });

    var controls = document.createElement('div');
    controls.className = 'track-controls';

    var muteBtn = document.createElement('button');
    muteBtn.type = 'button';
    muteBtn.className = 'track-mute';
    muteBtn.textContent = 'M';
    muteBtn.title = 'Mute row';
    muteBtn.setAttribute('aria-label', 'Mute row');
    muteBtn.setAttribute('aria-pressed', 'false');
    muteBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!Sound.params.trackMutes) Sound.params.trackMutes = {};
      Sound.params.trackMutes[id] = !Sound.params.trackMutes[id];
      syncLaneMuteSolo(lane, id);
      saveSoundPrefs();
    });

    var soloBtn = document.createElement('button');
    soloBtn.type = 'button';
    soloBtn.className = 'track-solo';
    soloBtn.textContent = 'S';
    soloBtn.title = 'Solo row';
    soloBtn.setAttribute('aria-label', 'Solo row');
    soloBtn.setAttribute('aria-pressed', 'false');
    soloBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!Sound.params.trackSolos) Sound.params.trackSolos = {};
      Sound.params.trackSolos[id] = !Sound.params.trackSolos[id];
      syncLaneMuteSolo(lane, id);
      saveSoundPrefs();
    });

    var lockBtn = document.createElement('button');
    lockBtn.type = 'button';
    lockBtn.className = 'track-lock';
    lockBtn.textContent = 'L';
    lockBtn.title = 'Lock module';
    lockBtn.setAttribute('aria-label', 'Lock module');
    lockBtn.setAttribute('aria-pressed', 'false');
    lockBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      closeModuleMenus();
      if (!Sound.params.trackLocks) Sound.params.trackLocks = {};
      Sound.params.trackLocks[id] = !Sound.params.trackLocks[id];
      syncLaneMuteSolo(lane, id);
      saveSoundPrefs();
    });

    controls.appendChild(muteBtn);
    controls.appendChild(soloBtn);
    controls.appendChild(lockBtn);
    head.appendChild(label);
    head.appendChild(controls);

    var vibeKey = 'lane-' + id;
    lane.addEventListener('mouseenter', function() {
      if (!soundEnabled) return;
      clearTimeout(previewTimer);
      var type = lane.dataset.trackType;
      NavVibe.noteOn(vibeKey, Sound.navFreqForTrack(type, row));
      previewTimer = setTimeout(function() {
        Sound.previewTrack(type, row);
      }, 70);
    });
    lane.addEventListener('mouseleave', function() {
      clearTimeout(previewTimer);
      NavVibe.noteOff(vibeKey);
    });

    var grid = document.createElement('div');
    grid.className = 'track-grid steps-' + stepCount();
    for (var i = 0; i < pat.length; i++) {
      var step = document.createElement('button');
      step.type = 'button';
      step.className = 'track-step';
      step.dataset.step = String(i);
      syncStepButton(step, pat[i]);
      step.setAttribute('aria-label', TYPE_LABEL[type] + ' step ' + (i + 1));
      grid.appendChild(step);
    }

    function handleStepInput(btn, soft) {
      clearTimeout(previewTimer);
      var s = Number(btn.dataset.step);
      var val = paintStep(pat, s, soft);
      syncStepButton(btn, val);
      syncLaneState(lane, pat);
      saveSoundPrefs();
      if (soundEnabled) {
        Sound.bootAudio();
        if (val) Sound.previewTrack(lane.dataset.trackType, row, val);
        syncPlayback();
      }
    }

    grid.addEventListener('click', function(e) {
      var btn = e.target.closest('.track-step');
      if (!btn) return;
      handleStepInput(btn, e.altKey);
    });

    grid.addEventListener('contextmenu', function(e) {
      var btn = e.target.closest('.track-step');
      if (!btn) return;
      e.preventDefault();
      handleStepInput(btn, true);
    });

    lane.appendChild(head);
    lane.appendChild(grid);
    row.appendChild(lane);
    row.classList.add('has-track-lane');
    row.dataset.trackType = type;
    syncLaneState(lane, pat);
    syncLaneMuteSolo(lane, id);
  }

  function updatePlayheadUI() {
    document.querySelectorAll('.track-step.playhead').forEach(function(el) {
      el.classList.remove('playhead');
    });
    document.querySelectorAll('.track-grid').forEach(function(grid) {
      var btn = grid.querySelector('.track-step[data-step="' + playhead + '"]');
      if (btn) btn.classList.add('playhead');
    });
  }

  function fireStep(step) {
    document.querySelectorAll('.track-lane').forEach(function(lane) {
      var id = lane.dataset.trackId;
      if (!rowAudible(id)) return;
      var type = lane.dataset.trackType;
      var pat = Sound.params.patterns[id];
      if (!pat || !pat[step]) return;
      flashStep(lane, step);
      var row = lane.closest('tr');
      if (row) Sound.playTrackStep(type, row, pat[step]);
    });
  }

  function stopSeq() {
    seqRunning = false;
    if (seqTimer) { clearTimeout(seqTimer); seqTimer = null; }
    playhead = 0;
    updatePlayheadUI();
    document.documentElement.classList.remove('sound-loop');
  }

  function startSeq() {
    if (seqRunning || !soundEnabled) return;
    seqRunning = true;
    Sound.bootAudio();
    document.documentElement.classList.add('sound-loop');
    function loop() {
      if (!seqRunning) return;
      fireStep(playhead);
      updatePlayheadUI();
      var delay = Math.max(12, Sound.stepDelayMs(playhead) + Sound.humanizeJitter());
      playhead = (playhead + 1) % stepCount();
      seqTimer = setTimeout(loop, delay);
    }
    loop();
  }

  function restartSeq() {
    stopSeq();
    startSeq();
  }

  function syncPlayback() {
    if (soundEnabled) startSeq();
    else stopSeq();
  }

  function mount() {
    if (mounted) unmount();
    document.querySelectorAll('.cv-section.midi-bank .cv-table tbody tr').forEach(buildLane);
    mounted = true;
  }

  function unmount() {
    stopSeq();
    document.querySelectorAll('.track-lane').forEach(function(el) { el.remove(); });
    document.querySelectorAll('.has-track-lane').forEach(function(row) {
      row.classList.remove('has-track-lane');
      delete row.dataset.trackType;
    });
    mounted = false;
  }

  function remount() {
    if (!soundEnabled) return;
    unmount();
    mount();
    syncPlayback();
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.track-label') && !e.target.closest('.track-module-menu')) {
      closeModuleMenus();
    }
  });

  return {
    mount: mount, unmount: unmount, remount: remount,
    syncPlayback: syncPlayback, restartSeq: restartSeq,
    closeModuleMenus: closeModuleMenus
  };
})();

// ── Scroll reveal ──────────────────────────────────────────────
function initScrollReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        en.target.classList.add('visible');
        obs.unobserve(en.target);
      }
    });
  }, { threshold: 0.07, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.cv-section').forEach(el => obs.observe(el));
}

// ── Helpers ────────────────────────────────────────────────────
function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function parseInline(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_(.+?)_/g, '<em>$1</em>');
}

// Split a table row on | but respect \| escaped pipes
function splitRow(line) {
  // Replace \| temporarily, split, then restore
  const tmp = line.replace(/\\\|/g, '\x00PIPE\x00');
  const inner = tmp.replace(/^\s*\|\s*|\s*\|\s*$/g, '');
  return inner.split('|').map(c => c.replace(/\x00PIPE\x00/g, '|').trim());
}

// Format a cell: **Bold** becomes title, rest becomes subtitle
function formatCell(text) {
  const m = text.match(/^\*\*(.+?)\*\*\s*[·\-–]?\s*(.*)/);
  if (m) {
    const title = m[1].trim();
    const sub   = m[2].trim();
    return `<span class="ent-title">${parseInline(title)}</span>` +
           (sub ? `<span class="ent-sub">${parseInline(sub)}</span>` : '');
  }
  return parseInline(text);
}

function isSeparatorRow(line) {
  return /^\s*\|?\s*[-:]+[-| :]*$/.test(line);
}

// Split entity cells so Role / location align across all tables
function splitEntityCell(text, kind) {
  const m = text.match(/^\*\*(.+?)\*\*\s*(?:·\s*)?(.*)/s);
  if (!m) return { entityHtml: formatCell(text), role: '', premiere: '' };
  const title = m[1].trim();
  const rest  = m[2].trim();
  const titleHtml = `<span class="ent-title">${parseInline(title)}</span>`;

  if (kind === 'company') {
    const parts = rest.split(/\s*·\s*/).filter(Boolean);
    return {
      entityHtml: titleHtml,
      role: parts[0] || '',
      premiere: parts.slice(1).join(' · ') || ''
    };
  }
  if (kind === 'event') {
    return { entityHtml: titleHtml, role: '', premiere: rest ? parseInline(rest) : '' };
  }
  if (kind === 'institution') {
    return { entityHtml: titleHtml, role: '', degree: rest ? parseInline(rest) : '' };
  }
  return { entityHtml: formatCell(text), role: '', premiere: '' };
}

/* Shared 7-column grid — all tables pad to these slots for horizontal alignment */
const MASTER_COLS = [
  { key: 'status',    cls: 'col-status' },
  { key: 'entity',    cls: 'col-entity' },
  { key: 'role',      cls: 'col-role' },
  { key: 'premiere',  cls: 'col-premiere' },
  { key: 'festivals', cls: 'col-festivals' },
  { key: 'awards',    cls: 'col-awards' },
  { key: 'support',   cls: 'col-support' }
];

const COL_LABELS = {
  film: {
    entity: 'Project', role: 'Role', premiere: 'Premiere',
    festivals: 'Festivals', awards: 'Awards', support: 'Support'
  },
  commercial: {
    entity: 'Company', role: 'Role', premiere: 'Location',
    festivals: 'Clients', awards: '', support: ''
  },
  event: {
    entity: 'Event', role: 'Role', premiere: 'Location',
    festivals: 'Details', awards: '', support: ''
  },
  education: {
    entity: 'Institution', role: 'Degree', premiere: '',
    festivals: 'Details', awards: '', support: ''
  }
};

function tableKind(headers) {
  const hl = headers.map(h => h.toLowerCase());
  if (hl.includes('status')) return 'film';
  if (hl.includes('company')) return 'commercial';
  if (hl.includes('event')) return 'event';
  if (hl.includes('institution')) return 'education';
  return 'generic';
}

function normalizeTable(headers, rows) {
  const hl = headers.map(h => h.toLowerCase());
  const kind = tableKind(headers);
  const labels = COL_LABELS[kind] || COL_LABELS.film;

  const canon = MASTER_COLS.map(col => {
    let cls = col.cls;
    if (col.key === 'festivals' && kind === 'film') cls += ' hide-mobile';
    if ((col.key === 'awards' || col.key === 'support') && kind === 'film') cls += ' hide-mobile';
    return { key: col.key, label: labels[col.key] || '', cls };
  });

  const data = rows.map(cells => {
    const raw = {};
    const html = {};
    hl.forEach((h, i) => { raw[h] = (cells[i] || '').trim(); });

    if (kind === 'film' && raw.project) {
      html.entity = formatCell(raw.project);
    } else if (kind === 'commercial' && raw.company) {
      const s = splitEntityCell(raw.company, 'company');
      html.entity = s.entityHtml;
      raw.role = s.role;
      raw.premiere = s.premiere;
      raw.festivals = raw.clients || '';
    } else if (kind === 'event' && raw.event) {
      const s = splitEntityCell(raw.event, 'event');
      html.entity = s.entityHtml;
      raw.premiere = s.premiere;
      raw.festivals = raw.details || '';
    } else if (kind === 'education' && raw.institution) {
      const s = splitEntityCell(raw.institution, 'institution');
      html.entity = s.entityHtml;
      raw.role = s.degree || '';
      raw.festivals = raw.details || '';
    }

    return { raw, html };
  });

  return { canon, data, kind };
}

// ── Table builder ──────────────────────────────────────────────
function buildTable(headers, rows) {
  const { canon, data } = normalizeTable(headers, rows);

  let out = '<div class="table-wrap"><table class="cv-table"><colgroup>';
  canon.forEach(col => { out += `<col class="${col.cls.split(' ')[0]}">`; });
  out += '</colgroup><thead><tr>';

  canon.forEach(col => {
    const label = col.label ? parseInline(col.label) : '';
    const labelAttr = label ? ` data-label="${label.replace(/"/g, '&quot;')}"` : '';
    out += `<th class="${col.cls}"${labelAttr}>${col.key === 'status' ? '' : label}</th>`;
  });
  out += '</tr></thead><tbody>';

  data.forEach(({ raw, html }) => {
    out += '<tr>';
    canon.forEach(col => {
      const c = ` class="${col.cls}"`;
      const label = col.label ? parseInline(col.label) : col.key;
      const labelAttr = col.key === 'status' ? '' :
        ` data-label="${label.replace(/"/g, '&quot;')}"`;

      if (col.key === 'status') {
        if (!raw.status) {
          out += `<td class="${col.cls} col-status-empty"${labelAttr}></td>`;
        } else {
          const done = raw.status.toLowerCase() === 'done';
          out += `<td${c}><span class="dot ${done ? 'dot-done' : 'dot-wip'}"></span></td>`;
        }
      } else if (col.key === 'entity') {
        const content = html.entity || '';
        out += `<td${c}${labelAttr}>${content}</td>`;
      } else {
        const val = raw[col.key] || '';
        out += `<td${c}${labelAttr}>${val ? parseInline(val) : ''}</td>`;
      }
    });
    out += '</tr>';
  });

  out += '</tbody></table></div>';
  return out;
}

// ── Frontmatter parser ─────────────────────────────────────────
function parseFrontmatter(raw) {
  const m = raw.match(/^\s*---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return { meta: {}, body: raw };
  const meta = {};
  m[1].split('\n').forEach(line => {
    const colon = line.indexOf(':');
    if (colon < 0) return;
    meta[line.slice(0, colon).trim()] = line.slice(colon + 1).trim();
  });
  return { meta, body: m[2] };
}

// ── Main render ────────────────────────────────────────────────
async function render() {
  let raw = '';
  try {
    const res = await fetch('content.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    raw = await res.text();
  } catch (err) {
    console.error('Could not load content.md:', err);
    document.getElementById('cv-bio').innerHTML =
      '<p>Could not load <code>content.md</code>. This site must be served over HTTP — run <code>python3 -m http.server</code> in this folder, or use Live Server.</p>';
    return;
  }
  const { meta, body } = parseFrontmatter(raw);

  // ── Meta fields ──
  if (meta.photo) document.getElementById('cv-photo').src = meta.photo;
  if (meta.subtitle) document.getElementById('cv-subtitle').textContent = meta.subtitle;

  // ── Parse body lines ──
  const lines = body.split('\n');
  let name        = '';
  let bioParts    = [];   // strings + '' for blank lines
  let sections    = [];
  let cur         = null; // current section
  let tblHeaders  = null;
  let tblRows     = [];

  function flushTable() {
    if (cur && tblHeaders) {
      cur.tables.push({ headers: tblHeaders, rows: tblRows });
    }
    tblHeaders = null; tblRows = [];
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // H1 = name
    if (trimmed.startsWith('# ') && !trimmed.startsWith('## ')) {
      name = trimmed.slice(2).trim();
      continue;
    }

    // H2 = new section
    if (trimmed.startsWith('## ')) {
      flushTable();
      if (cur) sections.push(cur);
      cur = { title: trimmed.slice(3).trim(), tables: [], paras: [] };
      continue;
    }

    // Table row
    if (trimmed.startsWith('|')) {
      const next = (lines[i + 1] || '').trim();
      if (!tblHeaders && isSeparatorRow(lines[i + 1] || '')) {
        // Header row
        tblHeaders = splitRow(trimmed);
        i++; // skip separator
        continue;
      } else if (tblHeaders && !isSeparatorRow(trimmed)) {
        tblRows.push(splitRow(trimmed));
        continue;
      }
    } else if (tblHeaders) {
      flushTable();
    }

    // Blank line
    if (!trimmed) {
      if (!cur) bioParts.push('');
      continue;
    }

    // Paragraph text
    if (!trimmed.startsWith('#')) {
      if (!cur) bioParts.push(trimmed);
      else      cur.paras.push(trimmed);
    }
  }
  flushTable();
  if (cur) sections.push(cur);

  // ── Set name ──
  document.getElementById('cv-name').textContent = name;
  document.title = name + (meta.subtitle ? ' — ' + meta.subtitle : '');

  const footerRight = [];
  if (meta.privacy) footerRight.push(`<a href="${meta.privacy}">Privacy Policy</a>`);
  if (meta.location) footerRight.push(`<span class="footer-plain">${meta.location}</span>`);
  footerRight.push(`<span class="footer-plain">© ${new Date().getFullYear()} ${name}. All rights reserved.</span>`);
  const footerLeft = meta.email
    ? `<span class="footer-left"><a href="mailto:${meta.email}">${meta.email}</a></span>` : '';
  const footerRightHtml = footerRight.length
    ? `<span class="footer-right">${footerRight.join('')}</span>` : '';
  document.getElementById('cv-footer').innerHTML = footerLeft + footerRightHtml;

  // ── Render bio: split on blank lines into <p> tags ──
  const bioParas = [];
  let para = [];
  bioParts.forEach(part => {
    if (part === '') {
      if (para.length) { bioParas.push(para.join(' ')); para = []; }
    } else {
      para.push(part);
    }
  });
  if (para.length) bioParas.push(para.join(' '));
  document.getElementById('cv-bio').innerHTML =
    bioParas.map(p => `<p>${parseInline(p)}</p>`).join('');

  // ── Render sections ──
  document.getElementById('cv-sections').innerHTML = sections.map(sec => {
    const slug  = slugify(sec.title);
    const id    = `sec-${slug}`;
    const isBank = MIDI_BANK_SLUGS.indexOf(slug) >= 0;
    const tbls  = sec.tables.map(t => buildTable(t.headers, t.rows)).join('');
    const paras = sec.paras.map(p => `<p>${parseInline(p)}</p>`).join('');
    return `<section class="cv-section${isBank ? ' midi-bank' : ''}" id="${id}" data-bank="${slug}">
      <div class="sec-head">
        <span class="sec-label">${parseInline(sec.title)}</span>
        <button class="sec-toggle" onclick="toggleSection('${id}')">Hide</button>
      </div>
      <div class="sec-body"><div class="sec-body-inner">${tbls}${paras}</div></div>
    </section>`;
  }).join('');

  // ── Restore hidden sections ──
  _hiddenOnLoad.forEach(id => {
    const sec = document.getElementById(id);
    if (!sec) return;
    sec.classList.add('sec-hidden');
    const btn = sec.querySelector('.sec-toggle');
    if (btn) btn.textContent = 'Show';
  });

  // ── Init scroll animations ──
  requestAnimationFrame(initScrollReveal);
  requestAnimationFrame(function() {
    attachTableSound();
    if (soundEnabled) TrackSeq.mount();
    TrackSeq.syncPlayback();
  });
}

// ── Export mode: inline A4 preview, print = WYSIWYG ──
var PRINT_PAGE_H_PX = 277 * (96 / 25.4);
var A4_PAGE_W_PX = 210 * (96 / 25.4);
var a4Anchors = { hero: null, work: null };

function isA4Mode() {
  return document.documentElement.classList.contains('a4-mode');
}

function activeNavBar() {
  return document.getElementById('toolbar');
}

function applyWorkScale(pct) {
  var scale = Math.max(0.5, Math.min(1, (pct || 100) / 100));
  document.documentElement.style.setProperty('--a4-work-scale', String(scale));
  var page2 = document.getElementById('a4-page-2');
  if (page2) page2.style.setProperty('--a4-work-scale', String(scale));
}

function autoFitWorkScale() {
  var page2 = document.getElementById('a4-page-2');
  if (!page2) return;
  applyWorkScale(100);
  void page2.offsetHeight;
  if (page2.scrollHeight > PRINT_PAGE_H_PX) {
    applyWorkScale(Math.min(100, Math.round((PRINT_PAGE_H_PX / page2.scrollHeight) * 100)));
  }
}

function preparePrintLayout() {
  if (!isA4Mode()) return;
  autoFitWorkScale();
  syncA4ToolbarOffset();
  updateA4ViewportScale();
}

function syncA4ToolbarOffset() {
  var tb = activeNavBar();
  var stage = document.getElementById('a4-stage');
  if (!tb || !stage || !isA4Mode()) return;
  stage.style.paddingTop = (tb.offsetHeight + 12) + 'px';
}

function updateA4ViewportScale() {
  var pages = document.getElementById('a4-pages');
  if (!pages || !isA4Mode()) return;
  var scale = Math.min(1, (window.innerWidth - 32) / A4_PAGE_W_PX);
  pages.style.zoom = scale < 1 ? String(scale) : '';
}

function mountA4Content() {
  var hero = document.getElementById('hero');
  var work = document.getElementById('print-work');
  var page1 = document.getElementById('a4-page-1');
  var page2 = document.getElementById('a4-page-2');
  if (!hero || !work || !page1 || !page2) return;
  if (!a4Anchors.hero) {
    a4Anchors.hero = { parent: hero.parentNode, next: hero.nextSibling };
    a4Anchors.work = { parent: work.parentNode, next: work.nextSibling };
  }
  page1.appendChild(hero);
  page2.appendChild(work);
}

function unmountA4Content() {
  var hero = document.getElementById('hero');
  var work = document.getElementById('print-work');
  if (!hero || !work || !a4Anchors.hero || !a4Anchors.work) return;
  var hA = a4Anchors.hero;
  var wA = a4Anchors.work;
  if (hA.next) hA.parent.insertBefore(hero, hA.next);
  else hA.parent.appendChild(hero);
  if (wA.next) wA.parent.insertBefore(work, wA.next);
  else wA.parent.appendChild(work);
}

function setA4Mode(on) {
  var html = document.documentElement;
  var stage = document.getElementById('a4-stage');
  var siteActions = document.getElementById('toolbar-site');
  var exportActions = document.getElementById('toolbar-export');
  var soundPanel = document.getElementById('sound-panel');
  if (on) {
    mountA4Content();
    html.classList.add('a4-mode');
    if (stage) stage.removeAttribute('hidden');
    if (siteActions) siteActions.hidden = true;
    if (exportActions) exportActions.hidden = false;
    if (soundPanel && soundPanel.classList.contains('open')) toggleSoundPanel();
    preparePrintLayout();
    window.scrollTo(0, 0);
  } else {
    html.classList.remove('a4-mode');
    if (stage) {
      stage.setAttribute('hidden', '');
      stage.style.paddingTop = '';
    }
    var pages = document.getElementById('a4-pages');
    if (pages) pages.style.zoom = '';
    var page2 = document.getElementById('a4-page-2');
    if (page2) page2.style.removeProperty('--a4-work-scale');
    document.documentElement.style.removeProperty('--a4-work-scale');
    if (siteActions) siteActions.hidden = false;
    if (exportActions) exportActions.hidden = true;
    unmountA4Content();
  }
}

function enterExportMode() {
  setA4Mode(true);
}

function exportA4() {
  if (!isA4Mode()) setA4Mode(true);
  preparePrintLayout();
  window.print();
}

var a4EnteredForPrint = false;

function initA4Controls() {
  document.getElementById('btn-export')?.addEventListener('click', enterExportMode);
  document.getElementById('btn-print')?.addEventListener('click', exportA4);
  document.getElementById('btn-back')?.addEventListener('click', function() { setA4Mode(false); });
  window.addEventListener('resize', function() {
    if (!isA4Mode()) return;
    syncA4ToolbarOffset();
    updateA4ViewportScale();
  });
  window.addEventListener('beforeprint', function() {
    if (!isA4Mode()) {
      a4EnteredForPrint = true;
      setA4Mode(true);
    }
    preparePrintLayout();
  });
  window.addEventListener('afterprint', function() {
    if (a4EnteredForPrint) {
      a4EnteredForPrint = false;
      setA4Mode(false);
    }
  });
}

document.addEventListener('DOMContentLoaded', function() {
  NavVibe.init();
  loadSoundPrefs();
  setA4Mode(false);
  initA4Controls();
  render();
});
